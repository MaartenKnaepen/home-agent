### 3. Update bot.py to set deps on GuardedToolset before each agent.run()

**File:** `src/home_agent/bot.py`

Modify the message handler to inject deps into the guarded toolsets:

```python
async def handle_message(
    update: Update,
    context: ContextTypes.DEFAULT_TYPE,
) -> None:
    """Handle incoming Telegram messages.
    
    Args:
        update: Telegram update.
        context: Telegram context.
    """
    user = update.effective_user
    message = update.effective_message
    
    if not user or not message or not message.text:
        return
    
    # Whitelist check (existing code)
    if user.id not in config.allowed_telegram_ids:
        await message.reply_text("You are not authorized.")
        return
    
    logger = logging.getLogger(__name__)
    
    # Fetch user profile and build deps (existing code)
    user_profile = await profile_manager.get(user.id)
    
    agent_deps = AgentDeps(
        config=config,
        profile_manager=profile_manager,
        history_manager=history_manager,
        user_profile=user_profile,
        guarded_toolsets=guarded_toolsets,  # NEW: Pass the toolsets to deps
    )
    
    # NEW: Set deps on each GuardedToolset before agent.run()
    for toolset in guarded_toolsets:
        toolset.deps = agent_deps
        logger.debug(
            "Set deps on GuardedToolset",
            extra={"user_id": user.id}
        )
    
    # Run agent (existing code)
    typing_on = await message.chat.send_action(ChatAction.TYPING)
    
    try:
        result = await agent.run(
            message.text,
            deps=agent_deps,
            # context_window=... if applicable
        )
        
        await message.reply_text(result.output)
    except Exception as e:
        logger.error(
            "Agent failed",
            extra={"user_id": user.id, "error": str(e)}
        )
        await message.reply_text("An error occurred. Please try again.")
    finally:
        await typing_on  # Turn off typing indicator
```

**Design notes:**
- `AgentDeps` now includes `guarded_toolsets` list
- Before each `agent.run()`, we set the `deps` reference on each guarded toolset
- This allows the guard middleware to read the user's profile at tool-call time
- Logging at DEBUG level when setting deps
- No changes to the actual agent.run() call or error handling

