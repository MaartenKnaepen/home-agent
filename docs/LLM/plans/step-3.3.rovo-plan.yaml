### 2. Update create_agent() to accept GuardedToolsets and register confirm_request

**File:** `src/home_agent/agent.py`

Modify the `create_agent()` function to:
- Accept `list[GuardedToolset]` (instead of `list[FastMCPToolset]`)
- Register the `confirm_request` tool
- Update AgentDeps to include `guarded_toolsets`

```python
from home_agent.tools.profile_tools import confirm_request  # Add import
from home_agent.mcp.guarded_toolset import GuardedToolset  # Add import

def create_agent(
    config: AppConfig,
    toolsets: list[GuardedToolset] | None = None,
) -> Agent:
    """Create the PydanticAI agent with toolsets and tools.
    
    Args:
        config: Application configuration.
        toolsets: List of GuardedToolset-wrapped MCP toolsets. If None, no MCP tools.
    
    Returns:
        Configured Agent instance.
    """
    if toolsets is None:
        toolsets = []
    
    # Create agent with GuardedToolsets (now guardrailed)
    agent = Agent(
        model=config.openrouter_model,
        deps_type=AgentDeps,
        system_prompt=SYSTEM_PROMPT,
        toolsets=toolsets,  # Accepts list[GuardedToolset] transparently
    )
    
    # Register custom tools (profile tools + confirm_request)
    @agent.tool
    async def update_user_note(ctx: RunContext[AgentDeps], note: str) -> str:
        """Existing implementation."""
        # ... existing code ...
    
    @agent.tool
    async def set_movie_quality(ctx: RunContext[AgentDeps], quality: str) -> str:
        """Existing implementation."""
        # ... existing code ...
    
    @agent.tool
    async def set_series_quality(ctx: RunContext[AgentDeps], quality: str) -> str:
        """Existing implementation."""
        # ... existing code ...
    
    @agent.tool
    async def set_reply_language(ctx: RunContext[AgentDeps], language: str) -> str:
        """Existing implementation."""
        # ... existing code ...
    
    # NEW: Register confirm_request tool
    @agent.tool
    async def confirm_request(
        ctx: RunContext[AgentDeps],
        mediaId: int,
        mediaType: str,
    ) -> str:
        """Confirm that the user approves the media request.
        
        Call this after the user says yes to your confirmation prompt.
        In Phase 4, this will be triggered by an inline keyboard button press.
        
        Args:
            ctx: Runtime context with dependencies.
            mediaId: TMDB ID of the media being requested.
            mediaType: "movie" or "tv".
        
        Returns:
            Confirmation string.
        """
        if not ctx.deps.guarded_toolsets:
            return "ERROR: No guarded toolset available. Cannot confirm."
        
        # Set confirmed flag on all guarded toolsets
        for toolset in ctx.deps.guarded_toolsets:
            toolset.set_confirmed(mediaId, mediaType)
        
        return f"Confirmed: {mediaType.upper()} (ID: {mediaId}). Proceeding with request."
    
    # Update dynamic system prompt injection (existing code)
    @agent.system_prompt(dynamic=True)
    async def inject_context(ctx: RunContext[AgentDeps]) -> str:
        """Inject user profile and quality settings into system prompt."""
        # ... existing code ...
    
    logger = logging.getLogger(__name__)
    logger.debug(
        "Agent created with GuardedToolsets",
        extra={"num_toolsets": len(toolsets), "has_confirm_request": True}
    )
    
    return agent
```

**Design notes:**
- Type signature now explicitly accepts `list[GuardedToolset]`
- `confirm_request` is registered as an `@agent.tool` (PydanticAI will see it in the tool list)
- No changes to existing tool registrations
- Logging confirms the agent is created with guardrails

