## Step-by-Step Implementation

### 1. Update MCPRegistry to wrap toolsets

**File:** `src/home_agent/mcp/registry.py`

Modify `get_toolsets()` to wrap each FastMCPToolset in a GuardedToolset:

```python
from home_agent.mcp.guarded_toolset import GuardedToolset

class MCPRegistry:
    # ... existing code ...
    
    async def get_toolsets(self) -> list[GuardedToolset]:
        """Get MCP toolsets wrapped in guard middleware.
        
        Returns:
            List of GuardedToolset instances.
        """
        toolsets = []
        logger = logging.getLogger(__name__)
        
        for server_name, config in self.server_configs.items():
            try:
                # Create the real FastMCPToolset (existing code)
                inner_toolset = await self._create_toolset(server_name, config)
                
                # Wrap it in GuardedToolset
                guarded = GuardedToolset(inner_toolset)
                toolsets.append(guarded)
                
                logger.debug(
                    f"Wrapped MCP toolset in GuardedToolset",
                    extra={"server": server_name}
                )
            except Exception as e:
                logger.error(
                    f"Failed to create toolset for {server_name}",
                    extra={"error": str(e)}
                )
                raise
        
        return toolsets
    
    async def _create_toolset(self, server_name: str, config: dict) -> FastMCPToolset:
        """Create a raw FastMCPToolset (existing implementation)."""
        # Existing code to create FastMCPToolset
        # This is unchanged — we just wrap the result in GuardedToolset above
        pass
```

**Design notes:**
- `get_toolsets()` now returns `list[GuardedToolset]` instead of `list[FastMCPToolset]`
- Each inner `FastMCPToolset` is wrapped transparently
- Logging at DEBUG level when wrapping
- No changes to the MCP server lifecycle (connect, disconnect) — those still happen at the inner toolset level

