import pytest
from unittest.mock import AsyncMock, MagicMock, patch
from pydantic_ai.models.test import TestModel

from home_agent.agent import create_agent, AgentDeps
from home_agent.profile import UserProfile, MediaPreferences
from home_agent.mcp.guarded_toolset import GuardedToolset


@pytest.fixture
def guarded_toolset_mock():
    """Mock GuardedToolset with call_tool that tracks calls."""
    toolset = MagicMock(spec=GuardedToolset)
    toolset.call_tool = AsyncMock()
    toolset.deps = None
    return toolset


@pytest.fixture
def agent_with_guards(guarded_toolset_mock):
    """Create agent with mocked GuardedToolset."""
    config = MagicMock()
    config.openrouter_model = "openrouter:free-model"
    
    agent = create_agent(config, toolsets=[guarded_toolset_mock])
    return agent, guarded_toolset_mock


@pytest.mark.asyncio
async def test_agent_flow_new_user_no_quality(agent_with_guards):
    """New user requests movie with no quality set → guard blocks → agent asks for quality."""
    agent, toolset_mock = agent_with_guards
    
    # Mock the guard blocking the request
    toolset_mock.call_tool.side_effect = [
        # First call: search_media succeeds
        '{"results": [{"id": 123, "title": "Inception", "year": 2010, "type": "movie"}]}',
        # Second call: request_media is blocked by guard
        "STOP: movie_quality not set. Ask the user: 'Do you prefer 4K or 1080p for movies?' Then call set_movie_quality with their answer.",
    ]
    
    # User with no quality preference
    user_profile = UserProfile(
        telegram_id=123,
        media_preferences=MediaPreferences(preferred_quality=None),
        confirmation_mode="never",
    )
    
    deps = AgentDeps(
        config=MagicMock(),
        profile_manager=AsyncMock(),
        history_manager=AsyncMock(),
        user_profile=user_profile,
        guarded_toolsets=[toolset_mock],
    )
    
    # Use TestModel to avoid real LLM calls
    with agent.override(model=TestModel()):
        result = await agent.run("Request Inception", deps=deps)
    
    # The agent should have tried to call search_media and then request_media
    # When request_media was blocked, the result should mention quality
    assert "quality" in result.output.lower() or "4k" in result.output.lower() or "1080p" in result.output.lower()


