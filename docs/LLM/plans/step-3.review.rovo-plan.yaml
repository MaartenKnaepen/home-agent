### 4. Remove unused type: ignore directives in formatting.py

**File:** `src/home_agent/formatting.py`

Remove all `# type: ignore[...]` comments. The type checker should pass without them now.

Current lines with type ignore directives:
- Line 60: `def _render_token(token: object, out: list[str]) -> None:  # type: ignore[type-arg]`
- Line 67: `t = token.type  # type: ignore[attr-defined]`
- Line 116: `out.append(f"<code>{html.escape(token.content)}</code>")  # type: ignore[attr-defined]`
- Line 123: `f\'{html.escape(token.content)}</code></pre>\\n\'  # type: ignore[attr-defined]`
- Line 126: `out.append(f"<pre>{html.escape(token.content)}</pre>\\n")  # type: ignore[attr-defined]`
- Line 156: `out.append(html.escape(token.content))  # type: ignore[attr-defined]`
- Line 164: `if token.content.strip() in safe:  # type: ignore[attr-defined]`
- Line 167: `out.append(token.content)  # type: ignore[attr-defined]`
- Line 177: `out.append(html.escape(token.content))  # type: ignore[attr-defined]`
- Line 181: `for child in token.children:  # type: ignore[attr-defined]`

Replace these lines without the type: ignore comments. The code is already correct; the type checker was just being overly strict due to the `token: object` parameter type hint. This is acceptable because we're checking token types at runtime with `token.type`.

**Design notes:**
- The `token: object` parameter is intentional — we receive tokens of unknown structure from markdown-it-py and introspect them at runtime.
- Runtime checks like `hasattr(token, "children")` and attribute access on dynamically-typed objects is fine.
- The type ignore comments were masking the real issue (loose type on a third-party object).

### 5. Add error handling with logging in db.py

**File:** `src/home_agent/db.py`

Update `get_history()` to wrap the database query in a try/except block:

```python
async def get_history(db_path: str | Path, *, user_id: int, limit: int | None = None) -> list[dict[str, str]]:
    """Fetch recent conversation history for a user.

    Args:
        db_path: File path to the SQLite database.
        user_id: Telegram user ID.
        limit: Optional max number of messages to return.

    Returns:
        List of messages sorted from oldest to newest.

    Raises:
        RuntimeError: If database query fails.
    """
    if limit is not None:
        query = """
            SELECT role, content FROM (
                SELECT role, content, id FROM conversations
                WHERE user_id = ?
                ORDER BY id DESC
                LIMIT ?
            ) ORDER BY id ASC
            """
        params = (user_id, limit)
    else:
        query = "SELECT role, content FROM conversations WHERE user_id = ? ORDER BY id ASC"
        params = (user_id,)
    try:
        async with aiosqlite.connect(db_path) as db:
            db.row_factory = aiosqlite.Row
            cursor = await db.execute(query, params)
            rows = await cursor.fetchall()
            await cursor.close()
        return [{"role": row["role"], "content": row["content"]} for row in rows]
    except aiosqlite.OperationalError as e:
        logger.error("Database query failed for user %d: %s", user_id, e, exc_info=True)
        raise RuntimeError(f"Failed to retrieve conversation history for user {user_id}") from e
```

Update `get_profile()` similarly:

```python
async def get_profile(db_path: str | Path, *, user_id: int) -> dict[str, Any] | None:
    """Retrieve a stored user profile payload.

    Args:
        db_path: File path to the SQLite database.
        user_id: Telegram user ID.

    Returns:
        Stored profile data, or None if missing.

    Raises:
        RuntimeError: If database query fails.
    """
    try:
        async with aiosqlite.connect(db_path) as db:
            cursor = await db.execute("SELECT data FROM user_profiles WHERE user_id = ?", (user_id,))
            row = await cursor.fetchone()
            await cursor.close()
        if row is None:
            return None
        return json.loads(row[0])
    except aiosqlite.OperationalError as e:
        logger.error("Database query failed for user %d: %s", user_id, e, exc_info=True)
        raise RuntimeError(f"Failed to retrieve profile for user {user_id}") from e
```

Don't forget to add the import at the top:

```python
import logging

logger = logging.getLogger(__name__)
```

**Design notes:**
- `aiosqlite.OperationalError` covers most database issues (corrupted DB, I/O errors, etc.).
- Logging at ERROR level makes these issues visible in production.
- Raising `RuntimeError` signals to callers that the operation failed definitively.

### 6. Extract system prompt helper in test_agent.py

**File:** `tests/test_agent.py`

Add a helper function at the top of the test file (after imports, before the first test):

```python
def extract_system_prompt_text(result) -> str:
    """Extract concatenated system prompt text from agent result.

    Helper to avoid copy-pasting the SystemPromptPart extraction pattern
    across all system prompt tests.

    Args:
        result: The result object from agent.run() with all_messages().

    Returns:
        Concatenated text from all SystemPromptPart objects.
    """
    from pydantic_ai.messages import SystemPromptPart

    return " ".join(
        part.content
        for msg in result.all_messages()
        for part in msg.parts
        if isinstance(part, SystemPromptPart)
    )
```

