### 13. Add doctest to history.py

**File:** `src/home_agent/history.py`

Add a doctest to `sliding_window_processor()` showing boundary behavior:

```python
def sliding_window_processor(
    *, n: int
) -> Callable[[list[ModelMessage]], list[ModelMessage]]:
    """Create a history processor that keeps only the last N message pairs.

    Returns a processor compatible with PydanticAI's history_processors.
    Each 'pair' is a ModelRequest followed by its ModelResponse.
    Tool-call/tool-result pairs are never split across the window boundary.

    Args:
        n: Number of message pairs to retain.

    Returns:
        A processor function that trims history to the last N pairs.

    Examples:
        >>> from pydantic_ai.messages import ModelRequest, ModelResponse, UserPromptPart, TextPart
        >>> processor = sliding_window_processor(n=2)
        >>> # Create 3 message pairs (6 messages total)
        >>> msgs = [
        ...     ModelRequest(parts=[UserPromptPart(content="Q1")]),
        ...     ModelResponse(parts=[TextPart(content="A1")]),
        ...     ModelRequest(parts=[UserPromptPart(content="Q2")]),
        ...     ModelResponse(parts=[TextPart(content="A2")]),
        ...     ModelRequest(parts=[UserPromptPart(content="Q3")]),
        ...     ModelResponse(parts=[TextPart(content="A3")]),
        ... ]
        >>> result = processor(msgs)
        >>> # Only the last 2 pairs (4 messages) are kept
        >>> len(result)
        4
        >>> isinstance(result[0], ModelRequest)
        True
        >>> result[0].parts[0].content
        'Q2'
        >>> isinstance(result[-1], ModelResponse)
        True
        >>> result[-1].parts[0].content
        'A3'
    """
```

**Design notes:**
- Doctests document expected behavior and serve as tests.
- They verify the sliding window keeps exactly N pairs (2n messages).
- They show that the processor preserves request/response order.

