### 4. deployment/docker-compose.yml additions

Add to the services section:

```yaml
  qwen3-asr:
    build:
      context: ../mcp_servers/qwen3_asr
      dockerfile: Dockerfile
    container_name: qwen3-asr
    environment:
      - ASR_MODEL=Qwen/Qwen3-ASR-1.7B
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
    ports:
      - "8086:8086"
    volumes:
      # Persist HuggingFace model cache across rebuilds
      # (prevents re-downloading 3.4GB on every docker-compose build)
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # Model loading takes 30-60s on Core i3
    restart: unless-stopped
    networks:
      - home-agent-net
    # NO gpu/runtime: nvidia — CPU only
```

Add to volumes section:
```yaml
volumes:
  huggingface_cache:
```

Update home-agent service:
```yaml
  home-agent:
    depends_on:
      seerr-mcp:
        condition: service_healthy
      qwen3-asr:
        condition: service_healthy  # ADD THIS
```

