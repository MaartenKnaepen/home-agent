---
step: 4.4b
title: Qwen3-ASR Docker Image (CPU-only)
goal: >
  Build a custom CPU-only Docker image for Qwen3-ASR-1.7B using the transformers
  backend. Expose a FastAPI HTTP transcription endpoint at POST /transcribe.
  Add the service to docker-compose.yml. No GPU, no CUDA, no NVIDIA runtime.

approach: |
  The official qwenllm/qwen3-asr:latest image is GPU-only (nvidia/cuda:12.8.0
  base, vLLM backend, 14.4GB). It cannot run on a Core i3 without an NVIDIA GPU.

  We build our own slim image:
  - Base: python:3.12-slim (no CUDA, no NVIDIA)
  - Backend: transformers (qwen-asr package, NOT qwen-asr[vllm])
  - PyTorch: CPU-only wheel (--index-url https://download.pytorch.org/whl/cpu)
  - Server: FastAPI + uvicorn
  - Audio: OGG/Opus accepted natively by qwen-asr (soundfile/librosa), no ffmpeg
  - model.transcribe() is synchronous — run in asyncio thread pool executor
  - Model pre-downloaded at Docker build time (cached in image layer)
  - bfloat16 dtype preferred (~3.4GB RAM); fallback to float32 if CPU unsupported

