@pytest.mark.asyncio
async def test_confirmed_flag_resets_after_request_media(
    guarded_toolset, mock_deps_with_quality, mock_inner_toolset
):
    """Confirmed flag resets after successful request_media."""
    deps = mock_deps_with_quality
    deps.user_profile.confirmation_mode = "always"
    guarded_toolset.deps = deps
    guarded_toolset.confirmed = True
    
    await guarded_toolset.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    )
    
    assert guarded_toolset.confirmed is False


@pytest.mark.asyncio
async def test_set_confirmed_sets_flag(guarded_toolset, caplog):
    """set_confirmed() sets the confirmed flag and logs."""
    guarded_toolset.set_confirmed(mediaId=123, mediaType="movie")
    
    assert guarded_toolset.confirmed is True
    assert "confirm_request called" in caplog.text
    assert "mediaId" in caplog.text


def test_guard_block_logs_warning(guarded_toolset, mock_deps_no_quality, caplog):
    """Guard block emits WARNING log."""
    guarded_toolset.deps = mock_deps_no_quality
    
    # This would be async in real code, but we're checking log output
    # In real test, wrap in asyncio.run() or use @pytest.mark.asyncio
    import asyncio
    asyncio.run(guarded_toolset.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    ))
    
    assert "request_media blocked by quality gate" in caplog.text


def test_pass_through_logs_debug(guarded_toolset, mock_deps_with_quality, caplog):
    """Pass-through emits DEBUG log."""
    guarded_toolset.deps = mock_deps_with_quality
    
    import asyncio
    import logging
    caplog.set_level(logging.DEBUG)
    
    asyncio.run(guarded_toolset.call_tool(
        "search_media",
        {"query": "Inception"}
    ))
    
    assert "Tool call allowed" in caplog.text
