@pytest.mark.asyncio
async def test_confirm_request_sets_flag(mock_deps):
    """confirm_request sets confirmed flag on guarded toolsets."""
    guarded_toolset = MagicMock()
    guarded_toolset.set_confirmed = MagicMock()
    mock_deps.guarded_toolsets = [guarded_toolset]
    
    ctx = RunContext(deps=mock_deps, model=MagicMock(), messages=[])
    result = await confirm_request(ctx, mediaId=123, mediaType="movie")
    
