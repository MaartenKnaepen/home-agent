import pytest
from unittest.mock import AsyncMock, MagicMock
from home_agent.mcp.guarded_toolset import GuardedToolset
from home_agent.agent import AgentDeps
from home_agent.profile import UserProfile, MediaPreferences


@pytest.fixture
def mock_inner_toolset():
    toolset = AsyncMock()
    toolset.call_tool = AsyncMock(return_value="tool result")
    return toolset


@pytest.fixture
def guarded_toolset(mock_inner_toolset):
    return GuardedToolset(mock_inner_toolset)


@pytest.fixture
def mock_deps_no_quality():
    profile = UserProfile(
        telegram_id=123,
        media_preferences=MediaPreferences(preferred_quality=None),
        confirmation_mode="never",
    )
    return AgentDeps(
        config=MagicMock(),
        profile_manager=MagicMock(),
        history_manager=MagicMock(),
        user_profile=profile,
        guarded_toolsets=[],
    )


@pytest.fixture
def mock_deps_with_quality():
    profile = UserProfile(
        telegram_id=123,
        media_preferences=MediaPreferences(preferred_quality="4k"),
        confirmation_mode="never",
    )
    return AgentDeps(
        config=MagicMock(),
        profile_manager=MagicMock(),
        history_manager=MagicMock(),
        user_profile=profile,
        guarded_toolsets=[],
    )


@pytest.mark.asyncio
async def test_request_media_blocked_when_movie_quality_not_set(
    guarded_toolset, mock_deps_no_quality
):
    """request_media blocked when movie_quality is None."""
    guarded_toolset.deps = mock_deps_no_quality
    
    result = await guarded_toolset.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    )
    
    assert "movie_quality not set" in result.lower()
    assert "set_movie_quality" in result


@pytest.mark.asyncio
async def test_request_media_blocked_when_series_quality_not_set(
    guarded_toolset, mock_deps_no_quality
):
    """request_media blocked when series_quality is None."""
    guarded_toolset.deps = mock_deps_no_quality
    
    result = await guarded_toolset.call_tool(
        "request_media",
        {"mediaType": "tv", "mediaId": 456, "seasons": "all"}
    )
    
    assert "series_quality not set" in result.lower()
    assert "set_series_quality" in result


@pytest.mark.asyncio
async def test_request_media_allowed_when_quality_set_and_no_confirmation(
    guarded_toolset, mock_deps_with_quality, mock_inner_toolset
):
    """request_media allowed when quality set and confirmation_mode='never'."""
    guarded_toolset.deps = mock_deps_with_quality
    
    result = await guarded_toolset.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    )
    
    assert result == "tool result"
    mock_inner_toolset.call_tool.assert_called_once()


@pytest.mark.asyncio
async def test_request_media_blocked_when_confirmation_required_and_not_confirmed(
    guarded_toolset, mock_deps_with_quality
):
    """request_media blocked when confirmation_mode='always' and not confirmed."""
    deps = mock_deps_with_quality
    deps.user_profile.confirmation_mode = "always"
    guarded_toolset.deps = deps
    
    result = await guarded_toolset.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    )
    
    assert "confirmation required" in result.lower()
    assert "confirm_request" in result


@pytest.mark.asyncio
async def test_request_media_allowed_when_confirmation_required_and_confirmed(
    guarded_toolset, mock_deps_with_quality, mock_inner_toolset
):
    """request_media allowed when confirmation_mode='always' and confirmed."""
    deps = mock_deps_with_quality
    deps.user_profile.confirmation_mode = "always"
    guarded_toolset.deps = deps
