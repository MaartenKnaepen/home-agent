---
step: 3.2
title: GuardedToolset — MCP Tool Call Middleware
goal: Create a GuardedToolset wrapper that intercepts MCP tool calls and enforces hard gates (quality must be set, confirmation required) before forwarding to the real MCP toolset. Add a confirm_request agent tool that signals user approval.

approach: |
  Option B from docs/LLM/other/tool_control.md: subclass/wrap the FastMCPToolset
  to intercept all tool calls at the dispatch level. Gate logic is centralised in
  one place — when new MCP servers are added (PDF, file converter, Glances), their
  tools pass through untouched unless explicitly gated.

  Key insight: prompts are suggestions, tool return values are facts. Gates return
  plain English error strings that the model must respond to as instructions.

