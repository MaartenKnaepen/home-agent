## Step-by-Step Implementation

### 1. Design the GuardedToolset Class

**File:** `src/home_agent/mcp/guarded_toolset.py`

Create a wrapper class that:
- Takes a `FastMCPToolset` instance in `__init__`
- Stores a reference to `AgentDeps` (will be set by bot.py before each agent.run() call)
- Implements a `call_tool(name: str, arguments: dict)` async method that intercepts all tool calls
- Tracks state: `confirmed` flag (bool), `called_tools` (set of tool names)

```python
class GuardedToolset:
    def __init__(self, inner_toolset: FastMCPToolset):
        self.inner_toolset = inner_toolset
        self.deps: Optional[AgentDeps] = None
        self.confirmed = False
        self.called_tools: set[str] = set()
    
    async def call_tool(self, name: str, arguments: dict) -> str:
        """Intercept tool call, apply guards, forward to real toolset."""
        logger = logging.getLogger(__name__)
        
        # Guard 1: request_media quality check
        if name == "request_media":
            media_type = arguments.get("mediaType")
            if media_type == "movie" and not self._has_movie_quality():
                error_msg = "STOP: movie_quality not set. Ask the user: 'Do you prefer 4K or 1080p for movies?' Then call set_movie_quality with their answer."
                logger.warning(
                    "request_media blocked by quality gate",
                    extra={"reason": "movie_quality_not_set", "message": error_msg}
                )
                return error_msg
            
            if media_type == "tv" and not self._has_series_quality():
                error_msg = "STOP: series_quality not set. Ask the user: 'Do you prefer 4K or 1080p for series?' Then call set_series_quality with their answer."
                logger.warning(
                    "request_media blocked by quality gate",
                    extra={"reason": "series_quality_not_set", "message": error_msg}
                )
                return error_msg
        
        # Guard 2: request_media confirmation check
        if name == "request_media":
            if self._needs_confirmation() and not self.confirmed:
                error_msg = "STOP: Confirmation required. Show the user exactly what you're about to request (title, year, quality) and call confirm_request with mediaId and mediaType after they approve."
                logger.warning(
                    "request_media blocked by confirmation gate",
                    extra={"reason": "confirmation_required", "message": error_msg}
                )
                return error_msg
        
        # All other tools pass through
        logger.debug(f"Tool call allowed", extra={"tool": name})
        result = await self.inner_toolset.call_tool(name, arguments)
        
        # Track successful calls and reset confirmation after request_media succeeds
        self.called_tools.add(name)
        if name == "request_media":
            self.confirmed = False
            logger.info("request_media succeeded, confirmation flag reset")
        
        return result
    
    def set_confirmed(self, media_id: int, media_type: str) -> None:
        """Called by confirm_request tool to set the confirmation flag."""
        self.confirmed = True
        logger = logging.getLogger(__name__)
        logger.info(
            "confirm_request called",
            extra={"mediaId": media_id, "mediaType": media_type}
        )
    
    def _has_movie_quality(self) -> bool:
        if not self.deps:
            return False
        return self.deps.user_profile.media_preferences.preferred_quality is not None
    
    def _has_series_quality(self) -> bool:
        if not self.deps:
            return False
        return self.deps.user_profile.media_preferences.preferred_quality is not None
    
    def _needs_confirmation(self) -> bool:
        if not self.deps:
            return False
        return self.deps.user_profile.confirmation_mode == "always"
```

**Design notes:**
- `call_tool` is async and returns a string (compatible with PydanticAI toolset API)
- Gates return plain English error strings — the model reads these as tool results and must respond
- `confirmed` flag is set by `confirm_request` tool, reset after `request_media` succeeds
- Quality checks read from `self.deps.user_profile.media_preferences.preferred_quality`
- Logging at three levels: WARNING (gate blocks), DEBUG (pass-through), INFO (confirm_request)
- `called_tools` set tracks what's been called in this turn (for future use: e.g., "must search before request")

