### 3. Update AgentDeps Dataclass

**File:** `src/home_agent/agent.py`

Modify the `AgentDeps` dataclass to include a reference to the guarded toolsets:

```python
from dataclasses import dataclass, field
from typing import Optional

@dataclass
class AgentDeps:
    """Dependencies injected into the agent at runtime."""
    config: AppConfig
    profile_manager: ProfileManager
    history_manager: HistoryManager
    user_profile: UserProfile
    guarded_toolsets: list[GuardedToolset] = field(default_factory=list)
```

This allows `confirm_request` tool to access the `GuardedToolset` instances and set the `confirmed` flag.

