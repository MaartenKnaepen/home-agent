### 2. Add confirm_request Tool to profile_tools.py

**File:** `src/home_agent/tools/profile_tools.py`

Add a new `@agent.tool` function that the model can call to signal user approval:

```python
@agent.tool
async def confirm_request(
    ctx: RunContext[AgentDeps],
    mediaId: int,
    mediaType: str,
) -> str:
    """Confirm that the user approves the media request.

    Call this after the user says yes to your confirmation prompt.
    In Phase 4, this will be triggered by an inline keyboard button press.

    Args:
        ctx: Runtime context with dependencies.
        mediaId: TMDB ID of the media being requested.
        mediaType: "movie" or "tv".

    Returns:
        Confirmation string.
    """
    if not ctx.deps.guarded_toolsets:
        return "ERROR: No guarded toolset available. Cannot confirm."
    
    # Set confirmed flag on all guarded toolsets
    for toolset in ctx.deps.guarded_toolsets:
        toolset.set_confirmed(mediaId, mediaType)
    
    return f"Confirmed: {mediaType.upper()} (ID: {mediaId}). Proceeding with request."
```

**Design notes:**
- Takes `mediaId` and `mediaType` for audit trail (prevents accidental requests for wrong media)
- Iterates over `ctx.deps.guarded_toolsets` and sets `confirmed` on each
- Returns a plain string confirming the action — the model sees this and knows to proceed
- No persistence needed — confirmation is ephemeral (reset after request_media succeeds)

