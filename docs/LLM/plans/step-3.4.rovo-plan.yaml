import pytest
from unittest.mock import AsyncMock, MagicMock
from home_agent.mcp.guarded_toolset import GuardedToolset
from home_agent.agent import AgentDeps
from home_agent.profile import UserProfile, MediaPreferences


@pytest.mark.asyncio
async def test_new_user_no_quality_movie_request(caplog):
    """New user with no quality set requests a movie — guard blocks."""
    import logging
    caplog.set_level(logging.WARNING)
    
    mock_toolset = AsyncMock()
    guarded = GuardedToolset(mock_toolset)
    
    deps = AgentDeps(
        config=MagicMock(),
        profile_manager=MagicMock(),
        history_manager=MagicMock(),
        user_profile=UserProfile(
            telegram_id=999,
            media_preferences=MediaPreferences(preferred_quality=None),
            confirmation_mode="never",
        ),
        guarded_toolsets=[],
    )
    guarded.deps = deps
    
    result = await guarded.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    )
    
    assert "movie_quality not set" in result
    assert "set_movie_quality" in result
    assert "WARNING" in caplog.text or "request_media blocked" in caplog.text


