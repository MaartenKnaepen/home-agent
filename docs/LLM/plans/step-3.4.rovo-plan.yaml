# api.yaml additions

tool_control:
  architecture: "Option B (subclassed MCP client) + thin Option A wrappers"
  source: "docs/LLM/other/tool_control.md"
  
  guarded_toolset:
    description: "Wraps FastMCPToolset and intercepts call_tool() to apply hard gates before forwarding to real toolset. All non-gated tools pass through transparently."
    location: "src/home_agent/mcp/guarded_toolset.py"
    gates:
      - name: movie_quality_required
        triggers_on: "request_media with mediaType='movie' and movie_quality=None"
        behavior: "Returns error string telling model to ask user for quality preference and call set_movie_quality"
        logging: "WARNING level with reason and message"
      
      - name: series_quality_required
        triggers_on: "request_media with mediaType='tv' and series_quality=None"
        behavior: "Returns error string telling model to ask user for quality preference and call set_series_quality"
        logging: "WARNING level with reason and message"
      
      - name: confirmation_required
        triggers_on: "request_media when confirmation_mode='always' and confirmed flag is False"
        behavior: "Returns error string telling model to show user the title/quality and call confirm_request"
        logging: "WARNING level with reason and message"
    
    pass_through: "All other tools (search_media, get_media_details, manage_media_requests, and any future tools from other MCP servers) pass through without any gate"
    logging: "DEBUG level when pass-through occurs"
  
  confirm_request_tool:
    description: "Agent-callable tool that sets the confirmed flag on GuardedToolset instances"
    location: "src/home_agent/tools/profile_tools.py"
    signature: "confirm_request(ctx: RunContext[AgentDeps], mediaId: int, mediaType: str) -> str"
    behavior: "Sets confirmed flag on all toolsets in ctx.deps.guarded_toolsets, returns confirmation string"
    logging: "INFO level with mediaId and mediaType"
    phase_4_note: "In Phase 4, this will be triggered by an inline keyboard button press instead of text 'yes'"
  
  workflow:
    search_first: "Always call search_media before request_media"
    quality_gate: "request_media blocked if movie_quality or series_quality not set; returns error string"
    confirmation_gate: "request_media blocked if confirmation_mode='always' and not confirmed; returns error string"
    confirm_then_request: "Model calls confirm_request → confirmed flag set → request_media allowed"
    reset: "Confirmed flag resets after successful request_media call"
