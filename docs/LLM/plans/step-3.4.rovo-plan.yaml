@pytest.mark.asyncio
async def test_quality_change_mid_conversation(caplog):
    """User changes quality preference mid-conversation — new value used."""
    import logging
    caplog.set_level(logging.DEBUG)
    
    mock_toolset = AsyncMock()
    mock_toolset.return_value = "request accepted"
    guarded = GuardedToolset(mock_toolset)
    
    user_profile = UserProfile(
        telegram_id=123,
        media_preferences=MediaPreferences(preferred_quality="4k"),
        confirmation_mode="never",
    )
    
    deps = AgentDeps(
        config=MagicMock(),
        profile_manager=MagicMock(),
        history_manager=MagicMock(),
        user_profile=user_profile,
        guarded_toolsets=[],
    )
    guarded.deps = deps
    
    # First request with 4K
    result1 = await guarded.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    )
    assert result1 == "request accepted"
    
    # Change quality to 1080p
    user_profile.media_preferences.preferred_quality = "1080p"
    
    # Second request with 1080p — should use updated quality
    result2 = await guarded.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 456, "is4k": False}
    )
    assert result2 == "request accepted"


