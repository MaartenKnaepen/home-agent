### 2. Integration Edge Cases

**File:** `tests/test_integration.py`

Add end-to-end edge case flows:

```python
@pytest.mark.asyncio
async def test_e2e_new_user_quality_gate_flow(agent_with_guards):
    """E2E: New user requests movie → quality gate fires → sets quality → requests successfully."""
    agent, toolset_mock = agent_with_guards
    
    # Sequence of tool calls:
    # 1. search_media("Inception") → returns results
    # 2. request_media(movie, 123) → blocked: movie_quality not set
    # 3. set_movie_quality("4k") → quality is set
    # 4. request_media(movie, 123, is4k=true) → succeeds
    
    toolset_mock.call_tool.side_effect = [
        '{"results": [{"id": 123, "title": "Inception"}]}',
        "STOP: movie_quality not set. Ask the user...",
    ]
    
    user_profile = UserProfile(
        telegram_id=123,
        media_preferences=MediaPreferences(preferred_quality=None),
        confirmation_mode="never",
    )
    
    deps = AgentDeps(
        config=MagicMock(),
        profile_manager=AsyncMock(),
        history_manager=AsyncMock(),
        user_profile=user_profile,
        guarded_toolsets=[toolset_mock],
    )
    
    with agent.override(model=TestModel()):
        result = await agent.run("Request Inception", deps=deps)
    
    # Agent should acknowledge the quality gate and ask for preference
    assert "quality" in result.output.lower() or "4k" in result.output.lower()


@pytest.mark.asyncio
async def test_e2e_confirmation_mode_always_flow(agent_with_guards):
    """E2E: User with confirmation_mode='always' → confirm_request gates request."""
    agent, toolset_mock = agent_with_guards
    
    toolset_mock.call_tool.side_effect = [
        '{"results": [{"id": 123, "title": "Inception"}]}',
        "STOP: Confirmation required. Show the user...",
    ]
    
    user_profile = UserProfile(
        telegram_id=123,
        media_preferences=MediaPreferences(preferred_quality="4k"),
        confirmation_mode="always",
    )
    
    deps = AgentDeps(
        config=MagicMock(),
        profile_manager=AsyncMock(),
        history_manager=AsyncMock(),
        user_profile=user_profile,
        guarded_toolsets=[toolset_mock],
    )
    
    with agent.override(model=TestModel()):
        result = await agent.run("Request Inception", deps=deps)
    
    # Agent should show confirmation prompt
    assert "confirm" in result.output.lower() or "Inception" in result.output
