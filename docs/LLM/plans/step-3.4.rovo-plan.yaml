@pytest.mark.asyncio
async def test_confirm_request_then_request_media_same_turn():
    """User confirms → confirm_request called → request_media succeeds in same turn."""
    mock_toolset = AsyncMock()
    mock_toolset.return_value = "request accepted"
    guarded = GuardedToolset(mock_toolset)
    
    deps = AgentDeps(
        config=MagicMock(),
        profile_manager=MagicMock(),
        history_manager=MagicMock(),
        user_profile=UserProfile(
            telegram_id=123,
            media_preferences=MediaPreferences(preferred_quality="4k"),
            confirmation_mode="always",
        ),
        guarded_toolsets=[guarded],
    )
    guarded.deps = deps
    
    # Simulate: guard blocks, model calls confirm_request, then request_media
    # 1. First attempt: blocked
    result1 = await guarded.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    )
    assert "Confirmation required" in result1
    
    # 2. Model calls confirm_request
    guarded.set_confirmed(123, "movie")
    assert guarded.confirmed is True
    
    # 3. Model calls request_media again
    result2 = await guarded.call_tool(
        "request_media",
        {"mediaType": "movie", "mediaId": 123, "is4k": True}
    )
    assert "request accepted" in result2


