---
step: 4.1
title: Rich Telegram Formatting
goal: >
  Replace plain text Telegram replies with beautifully formatted HTML output.
  Wire an inline keyboard for the confirmation flow (✅ Yes / ❌ No buttons).
  Show movie poster images at confirmation time using TMDB CDN URLs.

approach: |
  Three independent sub-tasks that can be implemented in sequence:

  1. formatting.py — Markdown → Telegram HTML converter using markdown-it-py
     token stream (already a transitive dependency). Owns the conversion logic
     completely; independently testable. bot.py imports and applies it.

  2. Inline keyboard — At confirmation time the agent calls a new
     send_confirmation_keyboard() @agent.tool instead of just asking in plain text.
     bot.py registers a CallbackQueryHandler; pressing ✅ Yes triggers
     confirm_request on the GuardedToolset directly (no LLM call needed).
     Pressing ❌ No resets confirmed=False and sends a cancellation message.

  3. Poster images — After confirmation is accepted, agent calls send_poster_image()
     with the posterPath from get_media_details. Bot constructs the full TMDB CDN
     URL and calls send_photo(). Telegram downloads directly from TMDB (public URL).
     Seerr's own proxy URL (http://seerr:8085/imageproxy/...) must NOT be used —
     it is not publicly reachable by Telegram's servers.

