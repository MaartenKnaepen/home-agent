## Tests

### test_formatting.py
```python
from home_agent.formatting import md_to_telegram_html

def test_bold(): assert md_to_telegram_html("**bold**") == "<b>bold</b>\n"
def test_italic(): assert md_to_telegram_html("*italic*") == "<i>italic</i>\n"
def test_inline_code(): assert "<code>x</code>" in md_to_telegram_html("`x`")
def test_fenced_code(): assert "<pre>" in md_to_telegram_html("```\ncode\n```")
def test_heading(): assert "<b>Header</b>" in md_to_telegram_html("# Header")
def test_list(): assert "•" in md_to_telegram_html("- item")
def test_escape_ampersand(): assert "&amp;" in md_to_telegram_html("5 & 3")
def test_escape_lt(): assert "&lt;" in md_to_telegram_html("a < b")
def test_escape_gt(): assert "&gt;" in md_to_telegram_html("a > b")
def test_plain_text(): assert md_to_telegram_html("hello") == "hello\n"
def test_fallback_on_error(): result = md_to_telegram_html(None)  # should not raise
```

