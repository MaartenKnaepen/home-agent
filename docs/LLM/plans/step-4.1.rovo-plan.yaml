## Step-by-Step Implementation

### 1. src/home_agent/formatting.py

Create a standalone module that converts Markdown to Telegram-safe HTML using
markdown-it-py's token stream. Do NOT use regex — walk the token tree.

```python
"""Markdown to Telegram HTML conversion.

Converts LLM Markdown output to the limited HTML subset supported by Telegram.
Uses markdown-it-py token stream for reliable parsing (no regex).

Telegram-supported HTML tags:
  <b>, <i>, <u>, <s>, <code>, <pre>, <a href>, <tg-spoiler>, <blockquote>

Unsupported nodes (tables, images, HR) are rendered as plain text fallbacks.
"""

from __future__ import annotations
import html
import logging
from markdown_it import MarkdownIt

logger = logging.getLogger(__name__)

_md = MarkdownIt()


def md_to_telegram_html(text: str) -> str:
    """Convert Markdown text to Telegram-safe HTML.

    Parses the Markdown using markdown-it-py's token stream and emits only
    HTML tags supported by Telegram. Unknown nodes fall back to plain text.
    Raw & < > in plain text portions are HTML-escaped to prevent parse errors.

    Args:
        text: Markdown-formatted text from the LLM.

    Returns:
        HTML string safe to pass to Telegram with parse_mode=ParseMode.HTML.
        Falls back to html.escape(text) if conversion raises unexpectedly.
    """
    try:
        tokens = _md.parse(text)
        return _render_tokens(tokens)
    except Exception:
        logger.exception("md_to_telegram_html failed, falling back to plain text")
        return html.escape(text)


def _render_tokens(tokens) -> str:
    """Walk a markdown-it-py token list and emit Telegram HTML.

    Args:
        tokens: List of Token objects from markdown-it-py.

    Returns:
        Rendered HTML string.
    """
    out: list[str] = []
    for token in tokens:
        _render_token(token, out)
    return "".join(out)


def _render_token(token, out: list[str]) -> None:
    t = token.type

    if t == "inline" and token.children:
        for child in token.children:
            _render_token(child, out)

    elif t == "paragraph_open":
        pass  # No <p> in Telegram; content follows inline

    elif t == "paragraph_close":
        out.append("\n")

    elif t in ("bullet_list_open", "ordered_list_open"):
        pass

    elif t in ("bullet_list_close", "ordered_list_close"):
        out.append("\n")

    elif t == "list_item_open":
        out.append("• ")

    elif t == "list_item_close":
        out.append("\n")

    elif t in ("heading_open",):
        out.append("<b>")

    elif t in ("heading_close",):
        out.append("</b>\n")

    elif t == "strong_open":
        out.append("<b>")

    elif t == "strong_close":
        out.append("</b>")

    elif t == "em_open":
        out.append("<i>")

    elif t == "em_close":
        out.append("</i>")

    elif t == "s_open":
        out.append("<s>")

    elif t == "s_close":
        out.append("</s>")

    elif t == "code_inline":
        out.append(f"<code>{html.escape(token.content)}</code>")

    elif t == "fence":
        lang = token.info.strip() if token.info else ""
        if lang:
            out.append(f'<pre><code class="{html.escape(lang)}">'
                       f'{html.escape(token.content)}</code></pre>\n')
        else:
            out.append(f"<pre>{html.escape(token.content)}</pre>\n")

    elif t == "code_block":
        out.append(f"<pre>{html.escape(token.content)}</pre>\n")

    elif t == "link_open":
        href = ""
        for attr in (token.attrs or []):
            if attr[0] == "href":
                href = html.escape(attr[1])
        out.append(f'<a href="{href}">')

    elif t == "link_close":
        out.append("</a>")

    elif t == "softbreak":
        out.append("\n")

    elif t == "hardbreak":
        out.append("\n")

    elif t == "hr":
        out.append("──────────\n")

    elif t == "text":
        out.append(html.escape(token.content))

    elif t == "html_inline":
        # Pass through only safe Telegram tags, escape everything else
        safe = {"<b>", "</b>", "<i>", "</i>", "<u>", "</u>",
                "<s>", "</s>", "<code>", "</code>"}
        if token.content.strip() in safe:
            out.append(token.content)
        else:
            out.append(html.escape(token.content))

    elif t in ("paragraph_open", "paragraph_close", "blockquote_open",
               "blockquote_close", "html_block"):
        if t == "blockquote_open":
            out.append("<blockquote>")
        elif t == "blockquote_close":
            out.append("</blockquote>\n")

    # All other token types (images, tables, etc.) are silently skipped
    # (they fall through to no output — plain text approach)

    elif token.children:
        for child in token.children:
            _render_token(child, out)
```

**Design notes:**
- `_md` is a module-level singleton — thread-safe for reads, no state
- `html.escape()` is applied to ALL plain text content — prevents Telegram parse errors
- Code blocks use `<pre><code>` (language class is optional but Telegram ignores it)
- Unknown token types with children recurse; without children are silently skipped
- Top-level fallback: if ANY exception occurs, return `html.escape(text)`

