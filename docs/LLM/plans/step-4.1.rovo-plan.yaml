**Register CallbackQueryHandler for inline keyboard:**

```python
from telegram.ext import CallbackQueryHandler

# In create_application(), after MessageHandler:
app.add_handler(CallbackQueryHandler(make_callback_handler(...)))
```

**Callback handler:**
```python
def make_callback_handler(
    config: AppConfig,
    guarded_toolsets: list[GuardedToolset],
    agent: Agent,
    ...
):
    async def handle_callback(update: Update, context: ContextTypes.DEFAULT_TYPE) -> None:
        query = update.callback_query
        await query.answer()  # Always answer to remove loading spinner

        user_id = update.effective_user.id
        if user_id not in config.allowed_telegram_ids:
            await query.edit_message_text("Not authorized.")
            return

        data = query.data  # e.g. "confirm:27205:movie" or "cancel"

        if data and data.startswith("confirm:"):
            _, media_id_str, media_type = data.split(":")
            media_id = int(media_id_str)
            for toolset in guarded_toolsets:
                toolset.set_confirmed(media_id, media_type)
            # Edit the keyboard message to show confirmation accepted
            await query.edit_message_text(
                f"✅ Confirmed. Requesting now...",
                parse_mode=ParseMode.HTML,
            )
            # Resume: run agent again with a synthetic "yes confirmed" message
            # so it calls request_media now that the gate is unblocked
            # ... (see design note below)

        elif data == "cancel":
            for toolset in guarded_toolsets:
                toolset.confirmed = False
            await query.edit_message_text("❌ Cancelled.")
    return handle_callback
```

**Design note on "resume after button press":**
After pressing ✅, the confirmed flag is set. But we need the agent to actually call `request_media` now. Two options:
1. **Re-run agent** with a synthetic message like `"Yes, confirmed. Please proceed."` — agent sees confirmed flag is set and calls request_media. Simple, works with current architecture.
2. **Store pending request context** (mediaId, mediaType, is4k) in `GuardedToolset` and call request_media directly from the callback handler without re-running agent.

**Recommendation: Option 1 (re-run agent)** — simpler, uses existing flow. The agent is instructed to "proceed with the request" and since confirmed=True, the guard passes.

**Callback data format:** `confirm:{mediaId}:{mediaType}` and `cancel`
- Max callback data is 64 bytes — `confirm:1234567:movie` is 22 bytes ✅

