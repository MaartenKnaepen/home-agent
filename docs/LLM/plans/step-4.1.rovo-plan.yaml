### 2. bot.py — Apply HTML formatting to all replies

**Add `parse_mode=ParseMode.HTML` to every `reply_text()` call:**

```python
from telegram.constants import ParseMode
from home_agent.formatting import md_to_telegram_html

# In handle_message, replace:
for chunk in _split_message(reply):
    await update.message.reply_text(chunk)

# With:
html_reply = md_to_telegram_html(reply)
for chunk in _split_message(html_reply):
    await update.message.reply_text(chunk, parse_mode=ParseMode.HTML)
```

**Also apply to error/rejection messages:**
```python
await update.message.reply_text(
    "⏳ The AI service is temporarily busy. Please try again in a moment.",
    parse_mode=ParseMode.HTML,
)
```

**Update `_split_message` to be HTML-aware:**

The current splitter splits at arbitrary character boundaries which could split an HTML tag like `<b>some ve` | `ry long text</b>`. Fix: only split at `\n` boundaries (never mid-tag), and ensure chunks never break inside an open HTML tag.

```python
def _split_message(text: str, max_length: int = 4096) -> list[str]:
    """Split a long message into chunks respecting HTML tag boundaries.

    Splits by newline only — never inside an HTML tag — to prevent broken
    Telegram HTML parse_mode output. If a single line exceeds max_length,
    it is split at max_length (rare: only for extreme cases).

    Args:
        text: The HTML-formatted message text to split.
        max_length: Maximum characters per chunk. Defaults to 4096.

    Returns:
        A list of string chunks, each at most max_length characters.
    """
