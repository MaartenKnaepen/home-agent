### 6. Tests

#### test_guarded_toolset.py — Update for stateless API

All tests that previously did:
```python
guarded.deps = mock_deps
guarded.confirmed = True
result = await _call(guarded, "request_media", {...})
```

Must now use `ctx.deps`:
```python
ctx = MagicMock()
ctx.deps = mock_deps  # AgentDeps with confirmed=True, user_profile with quality set
result = await guarded.call_tool("request_media", {...}, ctx, MagicMock())
```

New tests:
```python
async def test_call_tool_reads_confirmed_from_ctx_deps():
    """call_tool reads confirmed from ctx.deps, not self."""
    guarded = GuardedToolset(mock_inner)
    assert not hasattr(guarded, "confirmed")  # No instance attribute
    
    ctx = MagicMock()
    ctx.deps.confirmed = True
    ctx.deps.user_profile.confirmation_mode = "always"
    ctx.deps.user_profile.media_preferences.movie_quality = "4k"
    ctx.deps.role = "user"
    
    result = await guarded.call_tool("request_media", {"mediaType": "movie", "mediaId": 1}, ctx, MagicMock())
    assert result != "STOP: Confirmation required."


async def test_two_concurrent_users_do_not_interfere():
    """User A's confirmed does not affect User B's gate."""
    guarded = GuardedToolset(mock_inner)
    
    ctx_a = MagicMock()
    ctx_a.deps.confirmed = True  # User A confirmed
    ctx_a.deps.user_profile.confirmation_mode = "always"
    ctx_a.deps.user_profile.media_preferences.movie_quality = "4k"
    ctx_a.deps.role = "user"
    
    ctx_b = MagicMock()
    ctx_b.deps.confirmed = False  # User B not confirmed
    ctx_b.deps.user_profile.confirmation_mode = "always"
    ctx_b.deps.user_profile.media_preferences.movie_quality = "4k"
    ctx_b.deps.role = "user"
    
    # Run both concurrently
    result_a, result_b = await asyncio.gather(
        guarded.call_tool("request_media", {"mediaType": "movie", "mediaId": 1}, ctx_a, MagicMock()),
        guarded.call_tool("request_media", {"mediaType": "movie", "mediaId": 2}, ctx_b, MagicMock()),
    )
    
    # A succeeds, B is blocked
    assert "STOP" not in result_a
    assert "Confirmation required" in result_b


async def test_read_only_user_cannot_request_media():
    """read_only role blocked from request_media."""
    guarded = GuardedToolset(mock_inner)
    ctx = MagicMock()
    ctx.deps.role = "read_only"
    
    result = await guarded.call_tool("request_media", {"mediaType": "movie", "mediaId": 1}, ctx, MagicMock())
    assert "do not have permission" in result


async def test_guarded_toolset_has_no_stateful_attributes():
    """GuardedToolset has no deps/confirmed/called_tools attributes."""
    guarded = GuardedToolset(mock_inner)
    assert not hasattr(guarded, "deps")
    assert not hasattr(guarded, "confirmed")
    assert not hasattr(guarded, "called_tools")
```

