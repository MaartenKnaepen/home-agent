### 2. AgentDeps — Add confirmed, called_tools, role

**File:** `src/home_agent/agent.py`

```python
from dataclasses import dataclass, field
from telegram import Bot

@dataclass
class AgentDeps:
    """Dependencies injected into the agent at runtime.

    All fields are per-user and per-message — a fresh AgentDeps is created
    for each incoming message in handle_message(). GuardedToolset reads state
    from ctx.deps (this dataclass) via PydanticAI's RunContext, making the
    GuardedToolset itself stateless and safe for concurrent multi-user access.
    """
    config: AppConfig
    profile_manager: ProfileManager
    history_manager: HistoryManager
    user_profile: UserProfile
    guarded_toolsets: list[Any] = field(default_factory=list)  # list[GuardedToolset]
    telegram_bot: Bot | None = None
    telegram_chat_id: int | None = None
    # Per-message state (moved from GuardedToolset singleton to be user-isolated)
    confirmed: bool = False                          # Set when user confirms via ✅ button
    called_tools: set[str] = field(default_factory=set)  # Tools called this turn
    role: str = "user"                               # "admin" | "user" | "read_only"
```

