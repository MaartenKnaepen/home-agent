## Import-Linter Compliance

No new contracts needed. GuardedToolset reading from `ctx.deps` is entirely within
the mcp layer — it reads `AgentDeps` fields via duck typing (getattr), not by importing
from the agent module.

UserProfile.role is in the profile layer — no circular imports.

