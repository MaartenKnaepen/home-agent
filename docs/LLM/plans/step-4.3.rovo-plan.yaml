**Add** `pending_confirmations` dict to store button-press confirmations per user:
```python
# In create_application() — as a closure variable
pending_confirmations: dict[int, tuple[int, str]] = {}
# key: user_id, value: (mediaId, mediaType)
```

**In `handle_message()`** — read and consume confirmation if present:
```python
# After loading user_profile, before building AgentDeps:
confirmed = False
if user_id in pending_confirmations:
    _media_id, _media_type = pending_confirmations.pop(user_id)
    confirmed = True
    logger.info(
        "Consumed pending confirmation for user",
        extra={"user_id": user_id, "mediaId": _media_id, "mediaType": _media_type}
    )

deps = AgentDeps(
    config=config,
    profile_manager=profile_manager,
    history_manager=history_manager,
    user_profile=user_profile,
    guarded_toolsets=guarded_toolsets,
    telegram_bot=context.bot,
    telegram_chat_id=update.effective_chat.id,
    confirmed=confirmed,           # ← from pending_confirmations or False
    called_tools=set(),
    role=user_profile.role,        # ← from UserProfile
)
```

**In callback handler** — write to `pending_confirmations` instead of `toolset.set_confirmed()`:
```python
async def handle_callback(update: Update, context: ContextTypes.DEFAULT_TYPE) -> None:
    query = update.callback_query
    await query.answer()

    user_id = update.effective_user.id
    data = query.data

    if data and data.startswith("confirm:"):
        _, media_id_str, media_type = data.split(":")
        media_id = int(media_id_str)
        # Store confirmation for this user — handle_message will consume it
        pending_confirmations[user_id] = (media_id, media_type)
        logger.info(
            "Stored pending confirmation",
            extra={"user_id": user_id, "mediaId": media_id, "mediaType": media_type}
        )
        await query.edit_message_text("✅ Confirmed. Requesting now...")
        # Re-run agent with synthetic message to trigger request_media
        await _run_agent_for_user(
            user_id=user_id,
            text="Confirmed. Please proceed with the request.",
            update=update,
            context=context,
            ...
        )

    elif data == "cancel":
        # No pending_confirmations entry needed — confirmed stays False
        pending_confirmations.pop(user_id, None)
        logger.info("Confirmation cancelled", extra={"user_id": user_id})
        await query.edit_message_text("❌ Cancelled.")
```

