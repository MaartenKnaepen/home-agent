### 4. UserProfile — Add role field

**File:** `src/home_agent/profile.py`

```python
from typing import Literal

class UserProfile(BaseModel):
    """User profile stored in SQLite.

    Attributes:
        telegram_id: Telegram user ID (primary key).
        media_preferences: Media quality and format preferences.
        confirmation_mode: Whether to confirm before requesting.
        reply_language: Language for agent replies.
        notes: Free-form notes about the user.
        role: Permission level — 'admin', 'user', or 'read_only'.
    """
    telegram_id: int
    media_preferences: MediaPreferences = Field(default_factory=MediaPreferences)
    confirmation_mode: Literal["always", "never"] = "always"
    reply_language: str = "english"
    notes: list[str] = Field(default_factory=list)
    role: Literal["admin", "user", "read_only"] = "user"  # NEW
```

**ProfileManager** — auto-assign admin role:
```python
async def get_or_create_profile(
    self, telegram_id: int, language_code: str | None = None
) -> UserProfile:
    """Get or create a user profile.

    Auto-assigns 'admin' role if telegram_id is in config.admin_telegram_ids.
    Auto-detects reply_language from language_code on first creation.
    """
    profile = await self._load(telegram_id)
    if profile is not None:
        # Update role if admin list changed
        expected_role = "admin" if telegram_id in self.config.admin_telegram_ids else profile.role
        if profile.role != expected_role:
            profile.role = expected_role
            await self._save(profile)
        return profile

    # New user — create default profile
    role = "admin" if telegram_id in self.config.admin_telegram_ids else "user"
    reply_language = _detect_language(language_code)
    profile = UserProfile(
        telegram_id=telegram_id,
        reply_language=reply_language,
        role=role,
    )
    await self._save(profile)
    return profile
```

