---
step: 4.3
title: Multi-User Support & GuardedToolset Stateless Refactor
goal: >
  Fix a critical concurrent multi-user bug by making GuardedToolset stateless.
  Move per-user state (confirmed, called_tools) from the shared singleton into
  AgentDeps (created fresh per-user per-message). Add role-based permission
  levels (admin, user, read_only) to UserProfile.

approach: |
  PART 1 — Stateless GuardedToolset (the critical fix):
  GuardedToolset is a long-lived singleton shared across ALL users. It currently
  stores self.deps, self.confirmed, and self.called_tools as mutable instance
  fields. With concurrent users this is a race condition: User A's confirmed flag
  can be set by User B's button press, and User A's quality check reads User B's
  profile because deps was overwritten.

  The fix: GuardedToolset stores ONLY self.inner_toolset (immutable, set once
  at registry creation time). call_tool() reads all user state from ctx.deps —
  which PydanticAI passes through per-call with the correct user's deps.
  confirmed and called_tools move into AgentDeps (created fresh each message).
  The callback handler stores confirmations in a pending_confirmations dict
  keyed by user_id; handle_message reads and clears it when building AgentDeps.

  PART 2 — Permission levels:
  Add role: Literal['admin', 'user', 'read_only'] = 'user' to UserProfile.
  read_only users can search but not request media (blocked in GuardedToolset).
  admin role auto-assigned based on admin_telegram_ids in AppConfig.

