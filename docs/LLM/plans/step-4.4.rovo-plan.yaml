### 2. mcp_servers/qwen3_asr/Dockerfile

```dockerfile
FROM python:3.12-slim

WORKDIR /app

# Install ffmpeg if needed for OGG → WAV conversion
# (include if investigation shows OGG not accepted natively)
RUN apt-get update && apt-get install -y ffmpeg && rm -rf /var/lib/apt/lists/*

COPY requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt

COPY server.py .

# Pre-download model at build time into the image layer
# (avoids slow first-start downloads; image will be large ~3.5GB)
RUN python -c "from transformers import pipeline; pipeline('automatic-speech-recognition', model='Qwen/Qwen3-ASR-1.7B')"

EXPOSE 8086

CMD ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8086"]
```

**Design notes:**
- Model is baked into the image at build time — first `docker-compose up --build` will be slow
  but subsequent starts are fast. Alternatively, mount a model cache volume (see compose).
- CPU-only: no CUDA, no GPU flags
- `python:3.12-slim` base keeps the image as small as possible

