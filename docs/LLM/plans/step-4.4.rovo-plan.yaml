## Performance Expectations on Core i3

| Voice message length | Expected transcription time (CPU, fp16) |
|---|---|
| < 5 seconds | 2-4 seconds |
| 5-15 seconds | 4-10 seconds |
| > 30 seconds | 15-30 seconds |

For long voice messages, consider showing a "🎙️ Transcribing your message..." reply first, then editing it when done. This prevents the user thinking the bot is broken.

