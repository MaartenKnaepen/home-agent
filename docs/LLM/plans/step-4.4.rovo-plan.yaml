## Step-by-Step Implementation

### 1. Investigate OGG/Opus support FIRST

**Before writing any code**, verify whether Qwen3-ASR accepts OGG/Opus directly:

```python
# Quick test in the ASR container:
from transformers import pipeline
asr = pipeline("automatic-speech-recognition", model="Qwen/Qwen3-ASR-1.7B")
result = asr("test.ogg")  # Does this work?
print(result["text"])
```

If it fails → add ffmpeg to the ASR container Dockerfile and convert OGG → WAV before passing to the pipeline.
If it works → no ffmpeg needed, pass OGG bytes directly.

**Decision must be documented in a comment in server.py.**

