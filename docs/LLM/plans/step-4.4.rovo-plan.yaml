### 7. src/home_agent/bot.py — voice_message_handler()

```python
import httpx
from telegram import Voice
from telegram.ext import MessageHandler, filters

def make_voice_handler(
    config: AppConfig,
    profile_manager: ProfileManager,
    history_manager: HistoryManager,
    agent: Agent,
    guarded_toolsets: list[GuardedToolset] | None = None,
):
    """Create a Telegram voice message handler.

    Downloads voice OGG from Telegram, sends to ASR service for transcription,
    then forwards transcribed text to the normal message handler.

    Args:
        config: Application config (contains asr_url).
        profile_manager: User profile persistence.
        history_manager: Conversation history persistence.
        agent: PydanticAI agent instance.
        guarded_toolsets: Optional list of GuardedToolset instances.

    Returns:
        An async handler coroutine compatible with python-telegram-bot.
    """
    # Reuse the text message handler for actual agent invocation
    text_handler = make_message_handler(
        config, profile_manager, history_manager, agent, guarded_toolsets
    )

    async def handle_voice(update: Update, context: ContextTypes.DEFAULT_TYPE) -> None:
        """Handle an incoming Telegram voice message.

        Args:
            update: The incoming Telegram update containing the voice message.
            context: The callback context provided by python-telegram-bot.
        """
        if update.effective_user is None or update.message is None:
            return

        user_id = update.effective_user.id
        if user_id not in config.allowed_telegram_ids:
            await update.message.reply_text(_REJECTION_MESSAGE)
            return

        voice: Voice | None = update.message.voice
        if voice is None:
            return

        logger.debug("Voice message received from user %d, duration=%ds", user_id, voice.duration)

        # Show typing indicator during transcription (can take 2-5s on CPU)
        if update.effective_chat is not None:
            await update.effective_chat.send_action(action=ChatAction.TYPING)

        try:
            # Download OGG voice file from Telegram
            voice_file = await context.bot.get_file(voice.file_id)
            ogg_bytes = await voice_file.download_as_bytearray()

            logger.debug("Downloaded voice OGG: %d bytes", len(ogg_bytes))

            # POST to ASR service
            async with httpx.AsyncClient(timeout=60.0) as client:
                response = await client.post(
                    f"{config.asr_url}/transcribe",
                    files={"audio": ("voice.ogg", bytes(ogg_bytes), "audio/ogg")},
                )
                response.raise_for_status()
                transcribed_text = response.json()["text"]

            logger.info(
                "Transcribed voice for user %d: %r",
                user_id,
                transcribed_text[:100],
            )

            if not transcribed_text.strip():
                await update.message.reply_text(
                    "🎙️ I couldn't make out what you said. Please try again."
                )
                return

            # Inject transcribed text as if user typed it
            # Override update.message.text so handle_message sees it as a text message
            update.message._unfreeze()
            update.message.text = transcribed_text
            update.message._freeze()

            await text_handler(update, context)

        except httpx.HTTPError as e:
            logger.error("ASR service error for user %d: %s", user_id, e)
            await update.message.reply_text(
                "🎙️ Voice transcription is temporarily unavailable. Please type your message instead."
            )
        except Exception as e:
            logger.error("Voice handler failed for user %d: %s", user_id, e, exc_info=True)
            await update.message.reply_text(
                "🎙️ Something went wrong processing your voice message."
            )

    return handle_voice
```

**Design note on overriding `message.text`:**
python-telegram-bot `Message` objects are frozen by default. The cleanest approach is to NOT mutate `update.message.text` but instead extract the text and call `handle_message` logic directly. Alternative: pass `transcribed_text` directly into a shared inner function that both handlers call. This avoids mutation entirely — preferred approach.

