### 4. mcp_servers/qwen3_asr/server.py

```python
"""Qwen3-ASR-1.7B HTTP transcription server.

Exposes a single POST /transcribe endpoint that accepts audio bytes and returns
transcribed text. Runs on CPU — designed for home server deployment.

Audio format: OGG/Opus from Telegram.
[INVESTIGATION RESULT]: Document here whether OGG is accepted directly or
converted to WAV via ffmpeg.
"""

from __future__ import annotations

import io
import logging
import os
import subprocess
import tempfile
from contextlib import asynccontextmanager

import uvicorn
from fastapi import FastAPI, File, HTTPException, UploadFile
from fastapi.responses import JSONResponse
from transformers import pipeline

logger = logging.getLogger(__name__)

ASR_MODEL = os.environ.get("ASR_MODEL", "Qwen/Qwen3-ASR-1.7B")
DEVICE = "cpu"  # Always CPU — no GPU on home server

_asr_pipeline = None


@asynccontextmanager
async def lifespan(app: FastAPI):
    """Load model at startup, release at shutdown."""
    global _asr_pipeline
    logger.info("Loading ASR model: %s on %s", ASR_MODEL, DEVICE)
    _asr_pipeline = pipeline(
        "automatic-speech-recognition",
        model=ASR_MODEL,
        device=DEVICE,
    )
    logger.info("ASR model loaded successfully")
    yield
    _asr_pipeline = None
    logger.info("ASR model unloaded")


app = FastAPI(title="Qwen3-ASR", lifespan=lifespan)


@app.get("/health")
async def health() -> dict[str, str]:
    """Health check endpoint."""
    return {"status": "ok", "model": ASR_MODEL}


@app.post("/transcribe")
async def transcribe(audio: UploadFile = File(...)) -> JSONResponse:
    """Transcribe an audio file to text.

    Accepts OGG/Opus from Telegram voice messages. If OGG is not natively
    supported by the ASR pipeline, convert to WAV via ffmpeg first.

    Args:
        audio: Uploaded audio file (OGG/Opus from Telegram).

    Returns:
        JSON with 'text' field containing the transcription.

    Raises:
        HTTPException 500: If transcription fails.
    """
    if _asr_pipeline is None:
        raise HTTPException(status_code=503, detail="Model not loaded")

    try:
        audio_bytes = await audio.read()

        # Option A: Direct OGG (if investigation shows it works)
        # result = _asr_pipeline(io.BytesIO(audio_bytes))

        # Option B: Convert OGG → WAV via ffmpeg first
        with tempfile.NamedTemporaryFile(suffix=".ogg", delete=False) as ogg_file:
            ogg_file.write(audio_bytes)
            ogg_path = ogg_file.name

        with tempfile.NamedTemporaryFile(suffix=".wav", delete=False) as wav_file:
            wav_path = wav_file.name

        subprocess.run(
            ["ffmpeg", "-i", ogg_path, "-ar", "16000", "-ac", "1", wav_path, "-y"],
            check=True,
            capture_output=True,
        )

        result = _asr_pipeline(wav_path)
        text = result.get("text", "").strip()

        logger.info("Transcribed %d bytes → %d chars", len(audio_bytes), len(text))
        return JSONResponse({"text": text})

    except subprocess.CalledProcessError as e:
        logger.error("ffmpeg conversion failed: %s", e.stderr.decode())
        raise HTTPException(status_code=500, detail="Audio conversion failed") from e
    except Exception as e:
        logger.exception("Transcription failed")
        raise HTTPException(status_code=500, detail=f"Transcription failed: {e}") from e
    finally:
        # Clean up temp files
        import os as _os
        for path in [ogg_path, wav_path]:
            try:
                _os.unlink(path)
            except Exception:
                pass


if __name__ == "__main__":
    uvicorn.run(app, host="0.0.0.0", port=8086)
```

