## Success Criteria

- Docker-compose starts qwen3-asr service successfully
- `/health` endpoint returns `{"status": "ok"}`
- Voice message in Telegram → transcribed text → agent responds correctly
- OGG/Opus handling confirmed (direct or via ffmpeg, documented in server.py)
- ASR failure sends user-friendly error, does NOT crash bot
- Empty transcription handled gracefully
- Typing indicator shown during transcription
- All tests pass, `verify.sh` green (note: ASR container tests are integration-only,
