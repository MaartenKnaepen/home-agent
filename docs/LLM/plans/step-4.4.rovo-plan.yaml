---
step: 4.4
title: Voice Message Support (Qwen3-ASR-1.7B on CPU)
goal: >
  User sends a voice message in Telegram; a local Qwen3-ASR-1.7B Docker sidecar
  transcribes it on CPU; the transcribed text is fed to the agent as a normal
  text message. No GPU required. Expected latency: 2-5s on a Core i3.

approach: |
  Qwen3-ASR-1.7B is deployed as a Docker sidecar exposing a simple HTTP API.
  Bot downloads the OGG/Opus voice file from Telegram, POSTs it to the ASR
  container, receives the transcribed text, and calls handle_message() as if
  the user typed the text.

  Audio format investigation is REQUIRED before implementation:
  - Telegram sends voice messages as OGG/Opus
  - Qwen3-ASR uses transformers pipeline("automatic-speech-recognition")
  - Most HuggingFace ASR pipelines accept WAV (16kHz mono) natively
  - OGG/Opus → WAV conversion is best done IN the ASR container via ffmpeg
    (keep bot.py simple, no audio processing in Python)
  - If Qwen3-ASR accepts OGG directly (via soundfile or librosa), skip ffmpeg

  Model reference: https://huggingface.co/Qwen/Qwen3-ASR-1.7B
  Runs entirely on CPU (no GPU flags, no CUDA). Model is ~3.4GB in fp16.
  Consider quantized version if memory is tight on the Core i3.

