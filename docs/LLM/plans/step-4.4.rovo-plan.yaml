### 5. deployment/docker-compose.yml

Add the qwen3-asr service:

```yaml
  qwen3-asr:
    build:
      context: ../mcp_servers/qwen3_asr
      dockerfile: Dockerfile
    container_name: qwen3-asr
    environment:
      - ASR_MODEL=Qwen/Qwen3-ASR-1.7B
    ports:
      - "8086:8086"
    volumes:
      # Cache the HuggingFace model to avoid re-downloading on restart
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # Model loading takes time on CPU
    restart: unless-stopped
    networks:
      - home-agent-net

# Add to volumes section:
volumes:
  huggingface_cache:
```

**Note:** `start_period: 120s` — the model takes 30-60s to load on a Core i3 on first start.

**home-agent service dependency:**
```yaml
  home-agent:
    depends_on:
      qwen3-asr:
        condition: service_healthy
```

