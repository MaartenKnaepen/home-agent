# api.yaml — Home Agent Public API Reference
# Lists every public function, class, and tool in the project.
# LLM agents read this before implementing new code to discover reusable pieces.
# Updated after each completed step by autodev.

modules:
  # ── src/home_agent/config.py ────────────────────────────────────────────────
  - module: "src/home_agent/config.py"
    exports:
      - name: "AppConfig"
        type: "class"
        signature: "BaseSettings"
        description: "Application configuration loaded from environment variables via pydantic-settings."

      - name: "AppConfig.llm_model"
        type: "field"
        signature: "str = 'openrouter:qwen/qwq-32b:free'"
        description: "PydanticAI model string. Override via LLM_MODEL env var."

      - name: "AppConfig.mcp_port"
        type: "field"
        signature: "int = 8085"
        description: "Port number for the MCP server HTTP endpoint. Override via MCP_PORT env var."

      - name: "AppConfig.seerr_url"
        type: "field"
        signature: "str = 'http://localhost:8096'"
        description: "Overseerr/Seerr instance URL. Override via SEERR_URL env var."

      - name: "AppConfig.seerr_api_key"
        type: "field"
        signature: "SecretStr"
        description: "Overseerr/Seerr API key. Set via SEERR_API_KEY env var."

      - name: "AppConfig.llm_max_retries"
        type: "field"
        signature: "int = 3"
        description: "Maximum number of retries on HTTP 429 rate limit errors. Override via LLM_MAX_RETRIES env var."

      - name: "AppConfig.llm_retry_max_delay"
        type: "field"
        signature: "float = 30.0"
        description: "Maximum delay in seconds between LLM retry attempts. Caps exponential backoff. Override via LLM_RETRY_MAX_DELAY env var."

      - name: "AppConfig.llm_retry_base_delay"
        type: "field"
        signature: "float = 1.0"
        description: "Base delay in seconds for exponential backoff on retries. Doubles each retry. Override via LLM_RETRY_BASE_DELAY env var."

      - name: "get_config"
        type: "function"
        signature: "() -> AppConfig"
        description: "Singleton accessor for the global AppConfig instance."

  # ── src/home_agent/db.py ────────────────────────────────────────────────────
  - module: "src/home_agent/db.py"
    exports:
      - name: "init_db"
        type: "function"
        signature: "async (db_path: str | Path) -> None"
        description: "Initialize the SQLite database schema (conversations and user_profiles tables)."

      - name: "save_message"
        type: "function"
        signature: "async (db_path: str | Path, *, user_id: int, role: str, content: str) -> None"
        description: "Save a conversation message to the database."

      - name: "get_history"
        type: "function"
        signature: "async (db_path: str | Path, *, user_id: int, limit: int | None = None) -> list[dict[str, str]]"
        description: "Fetch recent conversation history for a user, oldest first."

      - name: "save_profile"
        type: "function"
        signature: "async (db_path: str | Path, *, user_id: int, data: dict[str, Any]) -> None"
        description: "Persist a user profile payload (upsert by user_id)."

      - name: "get_profile"
        type: "function"
        signature: "async (db_path: str | Path, *, user_id: int) -> dict[str, Any] | None"
        description: "Retrieve a stored user profile payload, or None if missing."

  # ── src/home_agent/history.py ───────────────────────────────────────────────
  - module: "src/home_agent/history.py"
    exports:
      - name: "HistoryManager"
        type: "class"
        signature: "__init__(db_path: str | Path)"
        description: "Wraps db.py for conversation history CRUD. save_message() and get_history() delegate to db layer."

      - name: "HistoryManager.save_message"
        type: "method"
        signature: "async (*, user_id: int, role: str, content: str) -> None"
        description: "Save a message to conversation history in SQLite."

      - name: "HistoryManager.get_history"
        type: "method"
        signature: "async (*, user_id: int, limit: int | None = None) -> list[dict[str, str]]"
        description: "Fetch conversation history for a user, oldest first."

      - name: "sliding_window_processor"
        type: "function"
        signature: "(*, n: int) -> Callable[[list[ModelMessage]], list[ModelMessage]]"
        description: "Returns a PydanticAI history_processors-compatible callable that keeps only the last N message pairs."

      - name: "convert_history_to_messages"
        type: "function"
        signature: "(history: list[dict[str, str]]) -> list[ModelMessage]"
        description: "Convert raw DB history records (dicts with 'role' and 'content' keys) to PydanticAI ModelMessage objects. User role → ModelRequest, assistant role → ModelResponse, unknown roles skipped with debug log."

  # ── src/home_agent/profile.py ───────────────────────────────────────────────
  - module: "src/home_agent/profile.py"
    exports:
      - name: "MediaPreferences"
        type: "class"
        signature: "BaseModel"
        description: "User's media download preferences. Fields: movie_quality (Literal['4k', '1080p'] | None), series_quality (Literal['4k', '1080p'] | None). None means not yet asked."

      - name: "UserProfile"
        type: "class"
        signature: "BaseModel"
        description: "Complete user profile with preferences and notes. Fields: user_id, name, created_at, updated_at, reply_language (str, default 'english'), confirmation_mode (Literal['always', 'never'], default 'always'), media_preferences (MediaPreferences), notes (list[str])."

      - name: "ProfileManager"
        type: "class"
        signature: "__init__(db_path: str | Path, *, default_profile: UserProfile | None = None)"
        description: "CRUD operations for user profiles with automatic default profile creation for new users."

      - name: "resolve_language"
        type: "function"
        signature: "(language_code: str | None) -> str"
        description: "Map a Telegram language_code (ISO 639-1, e.g. 'nl', 'en-US') to a human-readable language name. Handles region suffixes and None. Falls back to 'English' for unknown codes."

      - name: "ProfileManager.get"
        type: "method"
        signature: "async (user_id: int, *, language_code: str | None = None) -> UserProfile"
        description: "Get user profile from DB, or create and persist a default one if not found. On new user creation, resolves reply_language from language_code via resolve_language(). Ignored for existing profiles."

      - name: "ProfileManager.save"
        type: "method"
        signature: "async (profile: UserProfile) -> None"
        description: "Persist a user profile to the database, updating the updated_at timestamp."

  # ── src/home_agent/tools/__init__.py ─────────────────────────────────────────
  - module: "src/home_agent/tools/__init__.py"
    exports:
      - name: "tools"
        type: "package"
        signature: ""
        description: "Agent tools package. Contains tool functions registered on the PydanticAI agent in agent.py."

  # ── src/home_agent/tools/profile_tools.py ──────────────────────────────────
  - module: "src/home_agent/tools/profile_tools.py"
    exports:
      - name: "set_movie_quality"
        type: "tool"
        signature: "async (ctx: RunContext[Any], quality: Literal['4k', '1080p']) -> str"
        description: "Store the user's preferred movie download quality. Updates profile.media_preferences.movie_quality and persists via ProfileManager."

      - name: "set_series_quality"
        type: "tool"
        signature: "async (ctx: RunContext[Any], quality: Literal['4k', '1080p']) -> str"
        description: "Store the user's preferred series download quality. Updates profile.media_preferences.series_quality and persists via ProfileManager."

      - name: "set_reply_language"
        type: "tool"
        signature: "async (ctx: RunContext[Any], language: str) -> str"
        description: "Update the language the agent uses to reply to this user. Accepts natural language names (e.g. 'Dutch', 'French'). Persists via ProfileManager."

      - name: "set_confirmation_mode"
        type: "tool"
        signature: "async (ctx: RunContext[Any], mode: Literal['always', 'never']) -> str"
        description: "Toggle whether the agent confirms before requesting media. 'always' = confirm first (default), 'never' = request immediately. Persists via ProfileManager."

  # ── src/home_agent/agent.py ─────────────────────────────────────────────────
  - module: "src/home_agent/agent.py"
    exports:
      - name: "AgentDeps"
        type: "class"
        signature: "dataclass"
        description: "Dependencies injected into the agent at runtime: config, profile_manager, history_manager, user_profile."

      - name: "create_agent"
        type: "function"
        signature: "(toolsets: list[Any] | None = None, model: str = 'openrouter:qwen/qwq-32b:free', max_retries: int = 3, base_delay: float = 1.0, max_delay: float = 30.0) -> Agent[AgentDeps, str]"
        description: "Factory that creates a PydanticAI agent with optional MCP toolsets, sliding-window history processor (n=20), static system prompt (## Media Requests with SEARCH→DISAMBIGUATE→QUALITY→CONFIRM flow, ## Language, ## Preferences), dynamic system prompt (## Current User Context), update_user_note tool, 4 profile tools, and RetryingModel wrapper for 429 rate limit retry (capped at max_delay seconds)."

      - name: "inject_user_profile"
        type: "function"
        signature: "async (ctx: RunContext[AgentDeps]) -> str"
        description: "Dynamic system prompt that injects '## Current User Context' block with name, reply_language, confirmation_mode, movie/series quality (or 'NOT SET'), and notes. Registered inside create_agent()."

      - name: "update_user_note"
        type: "tool"
        signature: "async (ctx: RunContext[AgentDeps], note: str) -> str"
        description: "Agent tool that appends a note to the user's profile and persists it via ProfileManager. Registered inside create_agent()."

      - name: "get_agent_toolsets"
        type: "function"
        signature: "(registry: MCPRegistry) -> list[Any]"
        description: "Get MCP toolsets from the registry for agent construction. Thin wrapper over registry.get_toolsets()."

  # ── src/home_agent/bot.py ──────────────────────────────────────────────────
  - module: "src/home_agent/bot.py"
    exports:
      - name: "_error_handler"
        type: "function"
        signature: "async (update: object, context: ContextTypes.DEFAULT_TYPE) -> None"
        description: "Telegram error handler that logs all unhandled exceptions. Registered on the Application via add_error_handler()."

      - name: "make_message_handler"
        type: "function"
        signature: "(config: AppConfig, profile_manager: ProfileManager, history_manager: HistoryManager, agent: Agent[AgentDeps, str]) -> Callable[[Update, ContextTypes.DEFAULT_TYPE], Awaitable[None]]"
        description: "Create a Telegram message handler closure. Enforces whitelist, sends typing indicator, calls agent.run() with try/except, guards against empty reply, persists conversation history."

      - name: "create_application"
        type: "function"
        signature: "(config: AppConfig, profile_manager: ProfileManager, history_manager: HistoryManager, agent: Agent[AgentDeps, str]) -> Application"
        description: "Build and return a configured Telegram Application with message handler and error handler wired. Does NOT start polling."

      - name: "_split_message"
        type: "function"
        signature: "(text: str, max_length: int = 4096) -> list[str]"
        description: "Split a long string into chunks of at most max_length characters. Splits on newlines where possible; hard-splits long lines at max_length boundary. Used by handle_message to respect Telegram's 4096-char message limit."

  # ── src/home_agent/main.py ──────────────────────────────────────────────────
  - module: "src/home_agent/main.py"
    exports:
      - name: "setup_logging"
        type: "function"
        signature: "(log_level: str) -> None"
        description: "Configure root logger with the given level string (e.g. 'INFO', 'DEBUG')."

      - name: "_async_main"
        type: "function"
        signature: "async () -> None"
        description: "Async entry point. Initializes all components, opens MCP connections via async with agent:, starts Telegram bot polling. Blocks until interrupted."

      - name: "main"
        type: "function"
        signature: "() -> None"
        description: "Synchronous entry point. Calls asyncio.run(_async_main()) with KeyboardInterrupt handling."

  # ── Dockerfile ───────────────────────────────────────────────────────────────
  - module: "Dockerfile"
    exports:
      - name: "build"
        type: "stage"
        signature: "FROM ghcr.io/astral-sh/uv:python3.12-bookworm-slim"
        description: "Build stage: installs dependencies via uv sync --frozen --no-dev into .venv."

      - name: "runtime"
        type: "stage"
        signature: "FROM python:3.12-slim-bookworm"
        description: "Runtime stage: non-root appuser, copies .venv and src/ from build stage. Entry point: python -m home_agent.main. Health check via pgrep."

  # ── deployment/docker-compose.yml ────────────────────────────────────────────
  - module: "deployment/docker-compose.yml"
    exports:
      - name: "home-agent"
        type: "service"
        signature: "build: context: .., dockerfile: Dockerfile"
        description: "Home agent bot container. Loads .env, sets MCP_HOST=seerr-mcp for Docker networking, mounts home-agent-data volume at /app/data, depends on healthy seerr-mcp."

      - name: "seerr-mcp"
        type: "service"
        signature: "image: ghcr.io/jhomen368/overseerr-mcp:latest"
        description: "Overseerr MCP server. Streamable HTTP transport at /mcp on port 8085. Config via SEERR_URL, SEERR_API_KEY env vars. Health check via Python socket connect. Works out of the box — no patched entrypoint needed."

  # ── src/home_agent/mcp/servers.py ───────────────────────────────────────
  - module: "src/home_agent/mcp/servers.py"
    exports:
      - name: "ServerConfig"
        type: "dataclass"
        signature: "name: str, url: str, enabled: bool = True"
        description: "Configuration for an MCP server with name, URL, and enabled state."

      - name: "get_seerr_config"
        type: "function"
        signature: "(mcp_port: int = 8085) -> ServerConfig"
        description: "Create Overseerr/Seerr MCP server configuration. Uses MCP_HOST env var (default 'localhost') for host and mcp_port for port. URL: http://{mcp_host}:{port}/mcp (streamable HTTP)."

  # ── src/home_agent/mcp/registry.py ──────────────────────────────────────
  - module: "src/home_agent/mcp/registry.py"
    exports:
      - name: "MCPRegistry"
        type: "class"
        signature: "__init__() -> None"
        description: "Registry for MCP servers. Manages configurations and creates FastMCPToolset instances."

      - name: "MCPRegistry.register"
        type: "method"
        signature: "(config: ServerConfig) -> None"
        description: "Register an MCP server configuration."

      - name: "MCPRegistry.get_toolsets"
        type: "method"
        signature: "() -> list[FastMCPToolset]"
        description: "Create FastMCPToolset instances for all enabled servers."

      - name: "MCPRegistry.get_tool_names"
        type: "method"
        signature: "() -> list[str]"
        description: "Get list of enabled server names."

  # ── src/home_agent/models/__init__.py ─────────────────────────────────────
  - module: "src/home_agent/models/__init__.py"
    exports:
      - name: "models"
        type: "package"
        signature: ""
        description: "Custom PydanticAI model wrappers package."

  # ── src/home_agent/models/retry_model.py ────────────────────────────────────
  - module: "src/home_agent/models/retry_model.py"
    exports:
      - name: "OnRetryCallback"
        type: "type alias"
        signature: "Callable[[int, float], Coroutine[Any, Any, None]]"
        description: "Type alias for the async on_retry callback. Receives (attempt: int, wait_seconds: float)."

      - name: "RetryingModel"
        type: "class"
        signature: "Model"
        description: "PydanticAI Model wrapper that retries on HTTP 429 with exponential backoff. Accepts Model | str (lazy resolution via infer_model). Delegates system, model_name, request_stream to inner model. Streaming is not retried."

      - name: "RetryingModel.__init__"
        type: "method"
        signature: "(inner: Model | str, *, max_retries: int = 3, base_delay: float = 1.0, max_delay: float = 30.0, on_retry: OnRetryCallback | None = None) -> None"
        description: "Wrap an inner model (or model name string) with retry logic. String models are resolved lazily via infer_model() on first request. max_delay caps the exponential backoff (e.g. base_delay=1.0 doubles each retry but never exceeds max_delay seconds)."

      - name: "RetryingModel.request"
        type: "method"
        signature: "async (messages: list[ModelMessage], model_settings: ModelSettings | None, model_request_parameters: ModelRequestParameters) -> ModelResponse"
        description: "Delegate to inner model, retrying on 429 with exponential backoff up to max_retries times. Non-429 errors propagate immediately."

      - name: "RetryingModel.request_stream"
        type: "method"
        signature: "async (messages: list[ModelMessage], model_settings: ModelSettings | None, model_request_parameters: ModelRequestParameters) -> AsyncIterator[StreamedResponse]"
        description: "Delegate streaming request to inner model without retry. Uses @asynccontextmanager."

  # ── src/home_agent/mcp/guarded_toolset.py ──────────────────────────────────
  - module: "src/home_agent/mcp/guarded_toolset.py"
    exports:
      - name: "GuardedToolset"
        type: "class"
        signature: "(inner_toolset: Any)"
        description: "Wraps a FastMCPToolset and intercepts call_tool() to enforce hard gates before forwarding to the inner toolset. Implements Option B from tool_control.md. All non-gated tools pass through transparently, allowing new MCP servers (PDF, file converter, Glances) to be added without guard code changes."

      - name: "GuardedToolset.call_tool"
        type: "method"
        signature: "async (name: str, arguments: dict[str, Any]) -> str"
        description: "Intercept tool call and apply guard rules before forwarding to inner_toolset. Quality gate: blocks request_media if movie_quality or series_quality not set. Confirmation gate: blocks request_media if confirmation_mode='always' and confirmed flag not set. Returns plain English error strings that the model must respond to. All other tools pass through unmodified."

      - name: "GuardedToolset.set_confirmed"
        type: "method"
        signature: "(mediaId: int, mediaType: str) -> None"
        description: "Set the confirmed flag to unblock request_media when confirmation_mode='always'. Called by confirm_request tool. Logs at INFO level. Flag resets to False after successful request_media call."

      - name: "GuardedToolset.deps"
        type: "attribute"
        signature: "Any | None"
        description: "Reference to AgentDeps instance. Set by bot.py before each agent.run() call. Provides access to user_profile.media_preferences and user_profile.confirmation_mode at tool-call time."

      - name: "GuardedToolset.confirmed"
        type: "attribute"
        signature: "bool"
        description: "Ephemeral flag set by set_confirmed() and reset after successful request_media. Not persisted — conversational state within a single turn."

      - name: "GuardedToolset.called_tools"
        type: "attribute"
        signature: "set[str]"
        description: "Tracks which tools have been called (successfully or blocked) in the current turn. For audit and future sequencing rules."

  # ── src/home_agent/tools/profile_tools.py ────────────────────────────────────
  - module: "src/home_agent/tools/profile_tools.py"
    exports:
      - name: "confirm_request"
        type: "function (@agent.tool)"
        signature: "(ctx: RunContext[AgentDeps], mediaId: int, mediaType: str) -> str"
        description: "Agent-callable tool to set the confirmed flag on GuardedToolset instances. DEPRECATED for direct use in Phase 4+ — agent now calls send_confirmation_keyboard() which shows inline buttons; the bot callback handler calls GuardedToolset.set_confirmed() directly. confirm_request remains registered for backward compatibility."

  # ── src/home_agent/formatting.py ─────────────────────────────────────────────
  - module: "src/home_agent/formatting.py"
    exports:
      - name: "md_to_telegram_html"
        type: "function"
        signature: "(text: str) -> str"
        description: "Convert Markdown text to Telegram-safe HTML using markdown-it-py token stream. Handles bold, italic, inline code, fenced code blocks, headers, lists, and links. All plain text portions are html.escape()d to prevent parse errors. Unknown/unsupported Markdown nodes (tables, images) fall back to plain text. Falls back to html.escape(text) if any exception occurs. Thread-safe (module-level MarkdownIt singleton, no state)."

  # ── src/home_agent/tools/telegram_tools.py ───────────────────────────────────
  - module: "src/home_agent/tools/telegram_tools.py"
    exports:
      - name: "send_confirmation_keyboard"
        type: "function (@agent.tool)"
        signature: "(ctx: RunContext[AgentDeps], mediaId: int, mediaType: str, title: str, year: int | None, quality: str) -> str"
        description: "Send an InlineKeyboardMarkup to the user with ✅ Yes and ❌ No buttons. Callback data: 'confirm:{mediaId}:{mediaType}' for Yes, 'cancel' for No. Uses ctx.deps.telegram_bot and ctx.deps.telegram_chat_id. Logs at INFO level. Agent should call this instead of asking for text confirmation."

      - name: "send_poster_image"
        type: "function (@agent.tool)"
        signature: "(ctx: RunContext[AgentDeps], posterPath: str | None, caption: str | None = None) -> str"
        description: "Send a movie/TV poster image to the user via Telegram. Constructs the full TMDB CDN URL from the partial posterPath (e.g. '/abc123.jpg') returned by get_media_details: https://image.tmdb.org/t/p/w500{posterPath}. Telegram downloads directly from TMDB CDN (publicly reachable). Falls back to text if posterPath is None/empty or send_photo raises. IMPORTANT: never use Seerr proxy URLs — they are not publicly reachable by Telegram servers."

      - name: "TMDB_IMAGE_BASE"
        type: "constant"
        signature: "str"
        description: "Base URL for TMDB CDN poster images: 'https://image.tmdb.org/t/p/w500'. Append posterPath from get_media_details to form full URL."

  # ── Multi-User & Permissions ──────────────────────────────────────────────────
  - module: "src/home_agent/profile.py (role field)"
    exports:
      - name: "UserProfile.role"
        type: "field"
        signature: "Literal['admin', 'user', 'read_only'] = 'user'"
        description: "Permission level for this user. 'admin': full access, auto-assigned from config.admin_telegram_ids. 'user': default, can search and request. 'read_only': can search but request_media is blocked by GuardedToolset role gate."

  - module: "src/home_agent/config.py (admin_telegram_ids)"
    exports:
      - name: "AppConfig.admin_telegram_ids"
        type: "field"
        signature: "list[int] = []"
        description: "Telegram user IDs to auto-assign admin role on profile creation or update. Subset of allowed_telegram_ids. Set via ADMIN_TELEGRAM_IDS env var as JSON array."

  - module: "src/home_agent/agent.py (AgentDeps additions for 4.3)"
    exports:
      - name: "AgentDeps.confirmed"
        type: "dataclass field"
        signature: "bool = False"
        description: "Per-user per-message confirmation flag. Set True in handle_message if a pending_confirmations entry exists for this user (from ✅ button press). Read by GuardedToolset.call_tool() via ctx.deps. Replaces the old stateful self.confirmed on GuardedToolset."

      - name: "AgentDeps.called_tools"
        type: "dataclass field"
        signature: "set[str] = field(default_factory=set)"
        description: "Per-user per-message set of tool names called this turn. Updated by GuardedToolset.call_tool() via ctx.deps.called_tools.add(name). Replaces the old stateful self.called_tools on GuardedToolset."

      - name: "AgentDeps.role"
        type: "dataclass field"
        signature: "Literal['admin', 'user', 'read_only'] = 'user'"
        description: "Permission level copied from UserProfile.role when AgentDeps is built. Read by GuardedToolset.call_tool() via ctx.deps.role to enforce role gate (read_only cannot call request_media)."

  - module: "src/home_agent/bot.py (pending_confirmations)"
    exports:
      - name: "pending_confirmations"
        type: "closure variable (dict)"
        signature: "dict[int, tuple[int, str]]"
        description: "Scoped per create_application() call. Keys are user_id (int). Values are (mediaId, mediaType) tuples. Written by make_callback_handler when user presses ✅ Yes. Consumed (popped) by make_message_handler at the start of each handle_message call. Bridges the stateless callback handler to the agent run. No cross-user leakage possible — each handler only accesses its own user_id key."

  # ── Callback Handler ──────────────────────────────────────────────────────────
  - module: "src/home_agent/bot.py (callback handler)"
    exports:
      - name: "make_callback_handler"
        type: "function"
        signature: "(config: AppConfig, guarded_toolsets: list[GuardedToolset], agent: Agent, profile_manager: ProfileManager, history_manager: HistoryManager) -> Callable"
        description: "Creates the CallbackQueryHandler for inline keyboard button presses. 'confirm:{mediaId}:{mediaType}' → calls GuardedToolset.set_confirmed(mediaId, mediaType) on all toolsets, edits message to show confirmation accepted, re-runs agent with synthetic 'confirmed please proceed' message. 'cancel' → resets confirmed=False on all toolsets, edits message to show cancellation. Unauthorized users get rejection without processing."

  # ── AgentDeps additions ────────────────────────────────────────────────────────
  - module: "src/home_agent/agent.py (AgentDeps additions)"
    exports:
      - name: "AgentDeps.telegram_bot"
        type: "dataclass field"
        signature: "Bot | None = None"
        description: "Telegram Bot instance for tools that need to send messages directly (send_confirmation_keyboard, send_poster_image). Set by bot.py before each agent.run() call from context.bot."

      - name: "AgentDeps.telegram_chat_id"
        type: "dataclass field"
        signature: "int | None = None"
        description: "Current Telegram chat ID for tools that send messages directly. Set by bot.py before each agent.run() from update.effective_chat.id."

  # ── Composition & Wiring ─────────────────────────────────────────────────────
  - module: "src/home_agent/main.py"
    exports:
      - name: "async _async_main"
        type: "function"
        description: "Composition root. Orchestrates the entire lifecycle: creates config, initializes DB, creates MCPRegistry, registers Seerr, creates agent with GuardedToolsets, opens MCP context, creates Telegram application, passes guarded_toolsets to create_application()."
        key_insight: "GuardedToolsets flow through the entire chain: MCPRegistry.get_toolsets() → create_agent() → passed to create_application(guarded_toolsets=toolsets) → bot.py uses them for deps injection before each agent.run() call."

  - module: "src/home_agent/mcp/registry.py"
    exports:
      - name: "MCPRegistry.get_toolsets"
        type: "method"
        signature: "async () -> list[GuardedToolset]"
        description: "Returns each FastMCPToolset wrapped in a GuardedToolset. This is where the middleware layer is applied. Logs at DEBUG when wrapping."

  - module: "src/home_agent/bot.py"
    exports:
      - name: "make_message_handler"
        type: "function"
        signature: "(config: AppConfig, profile_manager: ProfileManager, history_manager: HistoryManager, agent: Agent, guarded_toolsets: list[GuardedToolset] | None = None) -> Callable"
        description: "Creates the Telegram message handler. Before each agent.run(), sets guarded_toolset.deps = agent_deps on every toolset in the guarded_toolsets list. This provides runtime access to the user's profile and confirmation state. Logs at DEBUG when setting deps."

      - name: "create_application"
        type: "function"
        signature: "(config: AppConfig, profile_manager: ProfileManager, history_manager: HistoryManager, agent: Agent, guarded_toolsets: list[GuardedToolset] | None = None) -> Application"
        description: "Creates the Telegram Application and registers message handlers. Accepts optional guarded_toolsets parameter and passes them to make_message_handler()."

  - module: "src/home_agent/agent.py"
    exports:
      - name: "create_agent"
        type: "function"
        signature: "(toolsets: list[Any] | None = None, model: str = ..., max_retries: int = 3, base_delay: float = 1.0, max_delay: float = 60.0) -> Agent"
        description: "Creates the PydanticAI agent with GuardedToolsets (or any toolsets). Registers confirm_request @agent.tool alongside other profile tools. Type hint is `list[Any]` to accept both FastMCPToolset and GuardedToolset transparently."

      - name: "AgentDeps"
        type: "dataclass"
        fields:
          - "config: AppConfig"
          - "profile_manager: ProfileManager"
          - "history_manager: HistoryManager"
          - "user_profile: UserProfile"
          - "guarded_toolsets: list[GuardedToolset] = field(default_factory=list)"
        description: "Injected into the agent at runtime. Includes guarded_toolsets so tools like confirm_request can access and modify the confirmed flag."

  - module: "src/home_agent/prompts.py"
    exports:
      - name: "SYSTEM_PROMPT"
        type: "string constant"
        description: "System prompt for the agent. Simplified to remove hard-enforcement language (MUST, NEVER, STOP) for gates now enforced in code. Kept happy-path guidance (search → disambiguate → quality → confirm → request) and tone guidance. Added confirm_request to available tools list and step 4 guidance."

# ── Tool Control Architecture ────────────────────────────────────────────────
tool_control:
  architecture: "Option B (subclassed MCP client) + thin Option A wrappers"
  source: "docs/LLM/other/tool_control.md"
  summary: |
    GuardedToolset wraps FastMCPToolset and intercepts call_tool() to apply hard gates
    before forwarding to the real toolset. Gates return plain English error strings that
    the LLM reads as tool results and must respond to. All non-gated tools pass through
    transparently, so new MCP servers (PDF, file converter, Glances) can be added without
    any guard code changes.

  guarded_toolset:
    description: "Wraps FastMCPToolset and intercepts call_tool() to apply hard gates before forwarding to real toolset. All non-gated tools pass through transparently."
    location: "src/home_agent/mcp/guarded_toolset.py"

    gates:
      - name: "movie_quality_required"
        triggers_on: "request_media with mediaType='movie' and movie_quality=None in user profile"
        behavior: "Returns error string: 'STOP: movie_quality not set. Ask the user... Then call set_movie_quality with their answer.'"
        logging: "WARNING: 'request_media blocked by quality gate' with reason=movie_quality_not_set"
        example_log: "WARNING home_agent.mcp.guarded_toolset - request_media blocked by quality gate"

      - name: "series_quality_required"
        triggers_on: "request_media with mediaType='tv' and series_quality=None in user profile"
        behavior: "Returns error string: 'STOP: series_quality not set. Ask the user... Then call set_series_quality with their answer.'"
        logging: "WARNING: 'request_media blocked by quality gate' with reason=series_quality_not_set"
        example_log: "WARNING home_agent.mcp.guarded_toolset - request_media blocked by quality gate"

      - name: "confirmation_required"
        triggers_on: "request_media when confirmation_mode='always' and confirmed flag is False"
        behavior: "Returns error string: 'STOP: Confirmation required. Show the user exactly what you're about to request (title, year, quality) and call confirm_request with mediaId and mediaType after they approve.'"
        logging: "WARNING: 'request_media blocked by confirmation gate' with reason=confirmation_required"
        example_log: "WARNING home_agent.mcp.guarded_toolset - request_media blocked by confirmation gate"

    pass_through:
      description: "All other tools (search_media, get_media_details, manage_media_requests, and any future tools from other MCP servers) pass through without any gate."
      logging: "DEBUG: 'Tool call allowed' with tool=<name>"
      example_log: "DEBUG home_agent.mcp.guarded_toolset - Tool call allowed"

    confirmed_flag_lifecycle:
      set_by: "set_confirmed(mediaId, mediaType) — called by confirm_request agent tool"
      reset_after: "Successful request_media call — so next request requires fresh confirmation"
      not_mediaId_scoped: "Flag is intentionally not tied to a specific mediaId — conversation context is expected to keep one media item in flight at a time"
      logging_on_set: "INFO: 'confirm_request called' with mediaId and mediaType"
      logging_on_reset: "INFO: 'request_media succeeded, confirmation flag reset'"

  confirm_request_tool:
    description: "Agent-callable tool that sets the confirmed flag on all GuardedToolset instances in ctx.deps.guarded_toolsets."
    location: "src/home_agent/tools/profile_tools.py"
    signature: "confirm_request(ctx: RunContext[AgentDeps], mediaId: int, mediaType: str) -> str"
    behavior: "Calls set_confirmed(mediaId, mediaType) on every GuardedToolset in guarded_toolsets. Returns confirmation string. Logs at INFO level."
    logging: "INFO: 'confirm_request called' with mediaId and mediaType (via GuardedToolset.set_confirmed)"
    phase_4_note: "In Phase 4, this will be triggered by an inline keyboard button press instead of a text 'yes' response."

  workflow:
    description: "Standard happy-path tool call sequence for media requests"
    steps:
      - step: 1
        action: "search_media(query)"
        gate: "none — always passes through"
        log: "DEBUG: Tool call allowed"
      - step: 2
        action: "request_media(mediaType, mediaId, is4k)"
        gate: "quality gate — blocked if movie_quality or series_quality not set"
        on_block: "Model asks user for quality preference and calls set_movie_quality or set_series_quality"
        log_on_block: "WARNING: request_media blocked by quality gate"
      - step: 3
        action: "request_media(mediaType, mediaId, is4k) [retry after quality set]"
        gate: "confirmation gate — blocked if confirmation_mode='always' and confirmed=False"
        on_block: "Model shows user what it's about to request and awaits approval"
        log_on_block: "WARNING: request_media blocked by confirmation gate"
      - step: 4
        action: "confirm_request(mediaId, mediaType)"
        gate: "none — agent tool, not an MCP tool"
        effect: "Sets confirmed=True on all GuardedToolsets"
        log: "INFO: confirm_request called"
      - step: 5
        action: "request_media(mediaType, mediaId, is4k) [retry after confirmation]"
        gate: "passes — quality set and confirmed=True"
        effect: "Forwards to inner toolset; resets confirmed=False after success"
        log: "DEBUG: Tool call allowed; INFO: request_media succeeded, confirmation flag reset"

  edge_cases:
    - scenario: "New user with no quality set requesting a movie"
      behaviour: "quality gate fires immediately on first request_media call; model asks for preference"
      test: "test_new_user_no_quality_movie_request in test_guarded_toolset.py"

    - scenario: "New user with no quality set requesting a TV series"
      behaviour: "quality gate fires for series_quality; model asks for series quality preference"
      test: "test_new_user_no_quality_series_request in test_guarded_toolset.py"

    - scenario: "Quality change mid-conversation"
      behaviour: "GuardedToolset reads quality from deps.user_profile at call time; updated quality is used immediately on next request_media call"
      test: "test_quality_change_mid_conversation in test_guarded_toolset.py"

    - scenario: "4K unavailable — fallback to 1080p"
      behaviour: "Guard only checks quality is SET, not what value. MCP returns 4K error; model retries with is4k=False. Both calls pass through guard (quality is set)."
      test: "test_four_k_unavailable_fallback_to_1080p in test_guarded_toolset.py"

    - scenario: "Series request with season selection and quality gate"
      behaviour: "Seasons parameter is passed through unchanged; guard only checks series_quality presence"
      test: "test_series_request_with_season_selection_and_quality_gate in test_guarded_toolset.py"

    - scenario: "confirm_request then request_media in same turn"
      behaviour: "Guard blocks → model calls set_confirmed → confirmed=True → model retries request_media → passes through → confirmed reset to False"
      test: "test_confirm_request_then_request_media_same_turn in test_guarded_toolset.py"

    - scenario: "confirm_request for wrong media ID"
      behaviour: "confirmed flag is not mediaId-scoped; set_confirmed(123) also unblocks request_media(456). Design decision: conversation context keeps one item in flight."
      test: "test_confirm_request_media_id_mismatch in test_guarded_toolset.py"

