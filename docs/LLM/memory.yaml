completed_steps:
  - step: "4.4b"
    name: "Qwen3-ASR Docker Image (CPU-only)"
    date: "2026-03-02"
    summary: "Custom CPU-only Docker image for Qwen3-ASR-1.7B. python:3.12-slim base (NOT nvidia/cuda). CPU-only PyTorch installed via --index-url https://download.pytorch.org/whl/cpu. qwen-asr transformers backend (NOT [vllm]). FastAPI server with /health and /transcribe endpoints. model.transcribe() run in asyncio thread pool executor to avoid blocking event loop. bfloat16 with float32 fallback (~3.4GB vs ~6.8GB RAM). OGG/Opus accepted natively via soundfile/librosa — no ffmpeg needed. Model pre-downloaded at build time. Added to docker-compose.yml with huggingface_cache volume, 120s healthcheck start_period, home-agent depends_on with service_healthy. 6 new test_docker.py tests. Official qwenllm/qwen3-asr:latest image was GPU-only (14.4GB, nvidia/cuda:12.8.0 base) and could not be used."
    decision: "Build custom image rather than using official GPU-only image. Transformers backend over vLLM (no GPU). bfloat16 dtype to halve RAM usage on Core i3."
  - step: "4.4a"
    name: "Voice Message Bot Integration"
    date: "2026-03-02"
    summary: "Voice message handler wired into bot. asr_url added to AppConfig (default: http://qwen3-asr:8086). Core agent invocation logic extracted into module-level _invoke_agent() shared by both text and voice handlers (eliminates DRY violation). make_voice_handler() downloads OGG from Telegram, POSTs to ASR container via httpx, feeds transcription to _invoke_agent(). Handles: empty transcription, HTTPStatusError, RequestError, TimeoutException. ChatAction.TYPING shown during transcription. Unauthorized users rejected before ASR call. 8 test_voice.py tests. 244 tests total."
    decision: "_invoke_agent() as module-level function allows both text and voice handlers to share the same agent invocation path without code duplication."
  - step: "4.3"
    name: "Multi-User Support & GuardedToolset Stateless Refactor"
    date: "2026-03-02"
    summary: "Fixed critical concurrent multi-user bug: GuardedToolset was a shared singleton with mutable self.deps/confirmed/called_tools — last writer wins race condition. Made GuardedToolset fully stateless (only stores inner_toolset). call_tool() reads all state from ctx.deps which PydanticAI passes per-call with the correct user's deps. confirmed/called_tools/role moved to AgentDeps (created fresh per-user per-message). Callback handler writes to pending_confirmations[user_id] dict; handle_message pops and consumes it before building AgentDeps. Added role: Literal['admin','user','read_only'] to UserProfile. admin_telegram_ids in AppConfig auto-assigns admin role. read_only blocked from request_media. 229 tests pass. asyncio.gather concurrent test proves isolation."
    decision: "Moved per-user state to AgentDeps rather than using per-user state dict inside GuardedToolset. This leverages PydanticAI's existing ctx.deps passing mechanism — no additional wiring needed. pending_confirmations dict in bot.py closure is the simplest solution for bridging the callback handler (no agent) to handle_message (agent run)."
  - step: "4.1"
    name: "Rich Telegram Formatting"
    date: "2026-03-02"
    summary: "Implemented md_to_telegram_html() in formatting.py using markdown-it-py token stream. All reply_text() calls use parse_mode=ParseMode.HTML. send_confirmation_keyboard() @agent.tool sends InlineKeyboardMarkup with callback_data='confirm:{mediaId}:{mediaType}' and 'cancel'. Callback handler in bot.py sets GuardedToolset.set_confirmed() then re-runs agent. send_poster_image() constructs TMDB CDN URL (https://image.tmdb.org/t/p/w500{posterPath}) — never uses Seerr proxy URL. AgentDeps extended with telegram_bot: Bot | None and telegram_chat_id: int | None. System prompt updated to use send_confirmation_keyboard instead of confirm_request for confirmation flow. 216 tests pass, framework boundary rules followed (real GuardedToolset in callback tests). Phase 4.2 removed (Seerr handles natively)."
    decision: "markdown-it-py chosen over telegramify-markdown (targets MarkdownV2 with complex escaping) and custom regex (fragile). markdown-it-py was already a transitive dep. TMDB CDN URLs used for poster images — Seerr's own proxy is not publicly reachable by Telegram servers."
  - step: "3.3"
    name: "Wire GuardedToolset into Agent Pipeline"
    date: "2026-03-02"
    summary: "Wired GuardedToolset throughout the agent pipeline. MCPRegistry.get_toolsets() now wraps each FastMCPToolset in a GuardedToolset before returning. bot.py sets guarded_toolset.deps = agent_deps before each agent.run() call for runtime access to user profile. main.py passes guarded_toolsets=toolsets to create_application() so the entire chain is connected. create_agent() registers confirm_request @agent.tool alongside existing profile tools. System prompt simplified: removed hard-enforced confirmation text, replaced with soft guidance."
    decision: "GuardedToolsets are created in MCPRegistry and passed through the entire composition chain: registry → agent (for PydanticAI toolset lifecycle) → bot (for deps injection) → main (orchestration). Deps injection happens per-message in bot.py before agent.run(), ensuring each request gets current user profile and confirmed flag state."
  - step: "3.2"
    name: "GuardedToolset — MCP Tool Call Middleware"
    date: "2026-03-02"
    summary: "Implemented GuardedToolset wrapper class in src/home_agent/mcp/guarded_toolset.py that intercepts MCP tool calls and enforces hard gates before forwarding to the inner FastMCPToolset. Quality gate blocks request_media if movie_quality or series_quality not set. Confirmation gate blocks if confirmation_mode='always' and not confirmed. confirm_request tool added to profile_tools.py to set the confirmed flag. All non-gated tools pass through transparently. Logging at appropriate levels (WARNING for blocks, DEBUG for pass-throughs, INFO for state changes). 22 comprehensive unit tests covering all gates, pass-throughs, flag lifecycle, and logging. All 138 tests pass, ty clean, import-linter contracts maintained."
    decision: "Option B (subclassed MCP client) + thin Option A wrappers. GuardedToolset intercepts all tool calls in one place — when new MCP servers are added (PDF, file converter, Glances), their tools pass through untouched unless explicitly gated. Prompts are suggestions; tool return values are facts. Gates return plain English error strings that the model must respond to. Confirmed flag is ephemeral (reset after request_media succeeds) — no persistence needed since it's conversational state within a turn."
