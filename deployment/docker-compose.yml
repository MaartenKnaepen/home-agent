# Run from the project root: docker compose -f deployment/docker-compose.yml --env-file .env up -d
# OR: cd deployment && ln -s ../.env .env && docker compose up -d
services:
  home-agent:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: home-agent
    env_file:
      - ../.env
    environment:
      # When running in Docker Compose, MCP server is reachable via service name
      - MCP_HOST=seerr-mcp
      # - LLM_RETRY_MAX_DELAY=30.0
    volumes:
      - home-agent-data:/app/data
    restart: unless-stopped
    depends_on:
      seerr-mcp:
        condition: service_healthy
    networks:
      - home-agent-network

  seerr-mcp:
    build:
      context: ../mcp_servers/seerr
      dockerfile: Dockerfile
    container_name: seerr-mcp
    env_file:
      - ../.env
    environment:
      - SEERR_URL=${SEERR_URL}
      - SEERR_API_KEY=${SEERR_API_KEY}
      - HTTP_MODE=true
      - PORT=${MCP_PORT:-8085}
    ports:
      - "${MCP_PORT:-8085}:${MCP_PORT:-8085}"
    restart: unless-stopped
    networks:
      - home-agent-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  home-agent-data:
    name: home-agent-data

networks:
  home-agent-network:
    name: home-agent-network
