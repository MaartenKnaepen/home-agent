# Run from the project root: docker compose -f deployment/docker-compose.yml --env-file .env up -d
# OR: cd deployment && ln -s ../.env .env && docker compose up -d
services:
  home-agent:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: home-agent
    env_file:
      - ../.env
    environment:
      # host networking: seerr-mcp and qwen3-asr are reachable via localhost
      # (their ports are published to the host — 8085 and 8086 respectively)
      - MCP_HOST=localhost
      - ASR_URL=http://localhost:8086
      # - LLM_RETRY_MAX_DELAY=30.0
    volumes:
      - home-agent-data:/app/data
    restart: unless-stopped
    depends_on:
      seerr-mcp:
        condition: service_healthy
      qwen3-asr:
        condition: service_healthy
    # Use host networking to bypass Docker bridge NAT.
    # This prevents TCP connection timeouts to api.telegram.org that occur
    # when the agent takes >30s (long enough for the NAT table entry to expire).
    # Trade-off: no network isolation, but acceptable for a home server bot.
    network_mode: host

  seerr-mcp:
    build:
      context: ../mcp_servers/seerr
      dockerfile: Dockerfile
    container_name: seerr-mcp
    env_file:
      - ../.env
    environment:
      - SEERR_URL=${SEERR_URL}
      - SEERR_API_KEY=${SEERR_API_KEY}
      - HTTP_MODE=true
      - PORT=${MCP_PORT:-8085}
    ports:
      - "${MCP_PORT:-8085}:${MCP_PORT:-8085}"
    restart: unless-stopped
    networks:
      - home-agent-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  qwen3-asr:
    build:
      context: ../mcp_servers/qwen3_asr
      dockerfile: Dockerfile
    container_name: qwen3-asr
    environment:
      - ASR_MODEL=Qwen/Qwen3-ASR-1.7B
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
    ports:
      - "8086:8086"
    volumes:
      # Persist HuggingFace model cache across rebuilds
      # (prevents re-downloading 3.4GB on every docker-compose build)
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - home-agent-network
    # NO runtime: nvidia — CPU only

volumes:
  home-agent-data:
    name: home-agent-data
  huggingface_cache:

networks:
  home-agent-network:
    name: home-agent-network
